// ============================================================
// TAB 6: FLOOR STACKING
// ============================================================
function renderStacking(d) {
  var h = '';

  // Program vs Capacity
  h += '<div class="card"><div class="card-title">Program vs. Building Capacity</div>';
  h += renderUtilizationBar(d);
  h += '<div style="display:flex;flex-wrap:wrap;gap:24px;align-items:flex-start;margin-top:16px">';
  h += '<div style="flex:1;min-width:240px">';
  var researchTotal = d.piNASF + d.coreNASF;
  h += '<div style="margin-bottom:12px;font-weight:700;color:var(--navy);font-size:1rem">Program Breakdown</div>';
  var progItems = [
    { label:'Research (Labs + Office)', nasf:d.piNASF, color:'var(--clrResearch)' },
    { label:'Core Facilities', nasf:d.coreNASF, color:'var(--clrCore)' },
    { label:'Community', nasf:d.communityNASFActual, color:'var(--clrCommunity)' },
    { label:'Event', nasf:d.eventNASF, color:'var(--clrEvent)' },
    { label:'Building Support', nasf:d.gfSupport||0, color:'var(--clrSupport)' },
  ];
  progItems.forEach(function(p) {
    var pct = d.totalNASF > 0 ? (p.nasf / d.totalNASF * 100) : 0;
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
    h += '<div style="width:12px;height:12px;border-radius:3px;background:'+p.color+';flex:none"></div>';
    h += '<span style="flex:1;font-size:.88rem;font-weight:600;color:var(--navy)">'+p.label+'</span>';
    h += '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.88rem;font-weight:700;color:var(--navy)">'+F(p.nasf)+'</span>';
    h += '<span style="font-size:.78rem;color:var(--mut);min-width:40px;text-align:right">'+pct.toFixed(0)+'%</span>';
    h += '</div>';
  });
  h += '<div style="display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:8px;border-top:2px solid var(--bdr)">';
  h += '<span style="flex:1;font-size:.95rem;font-weight:900;color:var(--navy)">Total Programmed</span>';
  h += '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:1rem;font-weight:900;color:var(--navy)">'+F(d.totalDemand)+'</span>';
  h += '</div>';
  h += '</div>'; // close flex:1 list
  h += '</div>'; // close flex wrapper
  h += '</div>'; // close card

  h += '<div class="note-bl">Net square footage on each occupied floor. Penthouse is always Building Support (MEP). Research floors show assigned program categories.</div>';

  // Core floor split from Tab 4 settings
  var cs = S.coreFloorSplit;
  var bsmtCoreNASF = Math.round(d.coreNASF * cs.basement);
  var gfCoreNASF = Math.round(d.coreNASF * cs.ground);
  var resCoreNASF = d.coreNASF - bsmtCoreNASF - gfCoreNASF;
  var corePerFloor = d.researchFloors > 0 ? Math.round(resCoreNASF / d.researchFloors) : 0;

  var commPerFloor = d.upperCommunityPerFloor;
  var labPerFloor = d.researchFloors > 0 ? Math.round((d.bldgOpenLab + d.bldgLabSupport + d.bldgDesk) / d.researchFloors) : 0;
  var officePerFloor = d.researchFloors > 0 ? Math.round(d.bldgOffice / d.researchFloors) : 0;

  // Floor capacity checks
  var gfAssigned = d.gfUsed + gfCoreNASF;
  var gfDeficit = Math.max(0, gfAssigned - d.gfNASF);
  var bsmtAssigned = bsmtCoreNASF + d.basementResearchNASF;
  var bsmtDeficit = Math.max(0, bsmtAssigned - d.basementNASF);
  var upperAssigned = labPerFloor + officePerFloor + corePerFloor + commPerFloor;
  var upperDeficit = Math.max(0, upperAssigned - d.researchFloorNASF);

  // Validation warning when any floor is over-programmed
  if (gfDeficit > 0 || bsmtDeficit > 0 || upperDeficit > 0) {
    h += '<div style="margin:8px 0 4px;padding:10px 14px;background:#FFEBEE;border-left:4px solid #E53935;border-radius:4px;font-size:.85rem;color:#B71C1C;line-height:1.55">';
    h += '<strong>\u26a0 Floor(s) Over-Programmed</strong><br>';
    if (gfDeficit > 0) h += 'Ground floor assigned <strong>'+F(gfAssigned)+' NASF</strong> exceeds capacity of <strong>'+F(d.gfNASF)+'</strong> by <strong>'+F(gfDeficit)+'</strong>. ';
    if (bsmtDeficit > 0) h += 'Basement assigned <strong>'+F(bsmtAssigned)+' NASF</strong> exceeds capacity of <strong>'+F(d.basementNASF)+'</strong> by <strong>'+F(bsmtDeficit)+'</strong>. ';
    if (upperDeficit > 0) h += 'Upper floors assigned <strong>'+F(upperAssigned)+' NASF</strong> per floor exceeds capacity of <strong>'+F(d.researchFloorNASF)+'</strong> by <strong>'+F(upperDeficit)+'</strong>. ';
    h += '<br><span style="color:#5D4037;font-size:.82rem">Adjust the building envelope (Tab 1), reduce program, or change the core floor split (Tab 4) so every floor fits its assigned program.</span>';
    h += '</div>';
  }

  h += '<div class="card"><div class="card-title">Building Section \u2014 Program Distribution</div>';
  h += '<div class="card-sub">Bar widths are proportional to floor plate GFA. Colored segments show assigned NASF. Labels at right show NASF, Departmental Gross (DGSF = GFA \u00d7 '+(S.deptGrossPct*100).toFixed(0)+'%), and Gross Floor Area (GFA). Core split controlled on Tab 4.</div>';
  h += '<div style="max-width:900px;margin:0 auto">';

  // Determine max GSF for proportional widths
  var maxFloorGSF = Math.max(S.basementGSF, S.aboveGradeGSF, S.penthouseGSF);

  h += floorVis('Penthouse', [{label:'Building Support', nasf:S.penthouseGSF, color:'var(--clrSupport)'}], S.penthouseGSF, true, S.penthouseGSF, maxFloorGSF);

  var topFloor = S.aboveGradeFloors;
  var pisPerFloor = d.researchFloors > 0 ? d.totalPIs / d.researchFloors : 0;
  var pisPerFloorLabel = pisPerFloor % 1 === 0 ? pisPerFloor.toFixed(0) : pisPerFloor.toFixed(1);
  for (var f = topFloor; f >= 2; f--) {
    var unassigned = Math.max(0, d.researchFloorNASF - upperAssigned);
    var segments = [
      { label:'Research Labs', nasf:labPerFloor, color:'var(--clrResearch)' },
      { label:'Faculty Office', nasf:officePerFloor, color:FICM.office },
      { label:'Core Facilities', nasf:corePerFloor, color:'var(--clrCore)' },
      { label:'Community', nasf:commPerFloor, color:'var(--clrCommunity)' }
    ];
    if (unassigned > 0) segments.push({ label:'', nasf:unassigned, color:FICM.supportB });
    var floorCapacity = Math.max(d.researchFloorNASF, upperAssigned);
    h += floorVis('Floor ' + f + (upperDeficit>0?' \u26a0':''), segments, floorCapacity, true, S.aboveGradeGSF, maxFloorGSF, upperDeficit > 0 ? d.researchFloorNASF : 0, pisPerFloorLabel);
  }

  // Floor 1 (Ground) — GF program items + core allocation
  var gfSegs = [];
  if (gfCoreNASF > 0) gfSegs.push({ label:'Core Facilities', nasf:gfCoreNASF, color:'var(--clrCore)' });
  S.gfProgram.forEach(function(g) {
    if (g.on) {
      var c = g.cat==='event'?'var(--clrEvent)' : g.cat==='support'?'var(--clrSupport)' : 'var(--clrCommunity)';
      gfSegs.push({ label:g.name.split('/')[0].split('(')[0].trim(), nasf:g.nasf, color:c });
    }
  });
  var gfRemaining = Math.max(0, d.gfNASF - gfAssigned);
  if (gfRemaining > 0) gfSegs.push({ label:'Building Support', nasf:gfRemaining, color:'var(--clrSupport)' });
  var gfBarNASF = Math.max(d.gfNASF, gfAssigned);
  h += floorVis('Floor 1 (Ground)' + (gfDeficit>0?' \u26a0':''), gfSegs, gfBarNASF, true, S.aboveGradeGSF, maxFloorGSF, gfDeficit > 0 ? d.gfNASF : 0);

  h += '<div style="border-top:3px solid #000;margin:4px 0"></div>';

  // Basement — core from split + research allocation + building support
  var bsmtResearch = d.basementResearchNASF;
  var bsmtOther = Math.max(0, d.basementNASF - bsmtAssigned);
  var bSegs = [];
  if (bsmtResearch > 0) bSegs.push({ label:'Faculty Research', nasf:bsmtResearch, color:'var(--clrResearch)' });
  if (bsmtCoreNASF > 0) bSegs.push({ label:'Core Facilities', nasf:bsmtCoreNASF, color:'var(--clrCore)' });
  if (bsmtOther > 0) bSegs.push({ label:'Building Support', nasf:bsmtOther, color:'var(--clrSupport)' });
  var bsmtBarNASF = Math.max(d.basementNASF, bsmtAssigned);
  h += floorVis('Basement' + (bsmtDeficit>0?' \u26a0':''), bSegs, bsmtBarNASF, true, S.basementGSF, maxFloorGSF, bsmtDeficit > 0 ? d.basementNASF : 0);

  h += '</div>';
  h += masterLegend();
  h += '<div style="margin-top:12px;padding:10px 14px;background:#f8f9fa;border-radius:8px;font-size:.82rem;color:var(--mut);line-height:1.5">';
  h += '<strong style="color:var(--navy)">How to read this diagram:</strong> Each bar represents one floor. ';
  h += 'The <strong>bar width</strong> is proportional to the floor\u2019s Gross Floor Area (GFA). ';
  h += 'Colored segments show <strong>assigned NASF</strong> (Net Assignable Square Feet) \u2014 the usable program area. ';
  h += 'The <span style="color:var(--clrSupport);font-weight:700">gray portion</span> at the end of a bar is NASF on that floor not yet assigned to a program category. ';
  h += 'A <span style="color:#E53935;font-weight:700">red dashed line</span> marks actual floor capacity when a floor is over-programmed \u2014 adjust the envelope or program until all segments fit within the line. ';
  h += 'Labels at right show three area measures: <strong style="color:var(--navy)">NASF</strong> (net assignable), <strong style="color:var(--teal)">DGSF</strong> (Departmental Gross = GFA \u00d7 Dept. Gross %), and <strong style="color:var(--mut)">GFA</strong> (Gross Floor Area). ';
  h += 'The difference between GFA and NASF accounts for walls, corridors, vertical circulation, restrooms, MEP, and other non-assignable area.';
  h += '</div>';
  h += '</div>';

  // Basement summary (read-only — actual allocation is on Basement tab)
  h += '<div class="card"><div class="card-title">Basement Allocation Summary</div>';
  h += '<div class="card-sub">Detailed per-typology allocation is on the <strong>Basement</strong> tab.</div>';
  h += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:6px;font-size:.95rem">';
  h += '<span>Capacity: <strong style="color:var(--navy)">'+F(d.basementCapacity)+'</strong> NASF</span>';
  h += '<span>Lab Allocation: <strong style="color:var(--clrResearch)">'+F(d.basementLabNASF)+'</strong></span>';
  h += '<span>Core Facilities: <strong style="color:var(--clrCore)">'+F(d.basementCoreNASF)+'</strong></span>';
  h += '<span>Remaining: <strong style="color:'+(d.basementSurplus<0?'var(--coral)':'var(--green)')+'">'+(d.basementSurplus>=0?'+':'')+F(d.basementSurplus)+'</strong></span>';
  h += '</div></div>';

  // Per-floor table
  h += '<div class="card"><div class="card-title">Per-Floor Area Summary</div>';
  h += '<table class="comp"><tr><th>Floor</th><th>PIs</th><th>GFA</th><th style="color:var(--teal)">DGSF</th><th>NASF</th><th style="color:var(--clrResearch)">Research Labs</th><th style="color:'+FICM.office+'">Faculty Office</th><th>Core</th><th>Community</th><th>Event</th><th>Unassigned</th></tr>';
  for (var f = topFloor; f >= 2; f--) {
    var floorUnassigned = Math.max(0, d.researchFloorNASF - upperAssigned);
    var overStyle = upperDeficit > 0 ? ' style="background:#FFEBEE"' : '';
    h += '<tr'+overStyle+'><td style="font-weight:700">Floor '+f+(upperDeficit>0?' <span style="color:#E53935">\u26a0</span>':'')+'</td><td style="font-weight:700;color:var(--clrResearch)">'+pisPerFloorLabel+'</td><td>'+F(S.aboveGradeGSF)+'</td><td style="color:var(--teal)">'+F(Math.round(S.aboveGradeGSF*S.deptGrossPct))+'</td><td>'+F(d.researchFloorNASF)+'</td><td>'+F(labPerFloor)+'</td><td>'+F(officePerFloor)+'</td><td>'+F(corePerFloor)+'</td><td>'+F(commPerFloor)+'</td><td>\u2014</td><td>'+F(floorUnassigned)+'</td></tr>';
  }
  var gfOverStyle = gfDeficit > 0 ? ' style="background:#FFEBEE"' : '';
  h += '<tr'+gfOverStyle+'><td style="font-weight:700">Floor 1 (Ground)'+(gfDeficit>0?' <span style="color:#E53935">\u26a0</span>':'')+'</td><td style="color:var(--mut)">\u2014</td><td>'+F(S.aboveGradeGSF)+'</td><td style="color:var(--teal)">'+F(Math.round(S.aboveGradeGSF*S.deptGrossPct))+'</td><td>'+F(d.gfNASF)+'</td><td>\u2014</td><td>\u2014</td><td>'+F(gfCoreNASF)+'</td><td>'+F(d.gfCommunity)+'</td><td>'+F(d.eventNASF)+'</td><td>'+F(gfRemaining)+'</td></tr>';
  var bsmtOverStyle = bsmtDeficit > 0 ? ' style="background:#FFEBEE"' : '';
  h += '<tr'+bsmtOverStyle+'><td style="font-weight:700">Basement'+(bsmtDeficit>0?' <span style="color:#E53935">\u26a0</span>':'')+'</td><td style="color:var(--mut)">\u2014</td><td>'+F(S.basementGSF)+'</td><td style="color:var(--teal)">'+F(Math.round(S.basementGSF*S.deptGrossPct))+'</td><td>'+F(d.basementNASF)+'</td><td>'+F(bsmtResearch)+'</td><td>\u2014</td><td>'+F(bsmtCoreNASF)+'</td><td>\u2014</td><td>\u2014</td><td>'+F(bsmtOther)+'</td></tr>';
  h += '<tr><td style="font-weight:700;color:var(--clrSupport)">Penthouse</td><td style="color:var(--mut)">\u2014</td><td>'+F(S.penthouseGSF)+'</td><td style="color:var(--teal)">'+F(Math.round(S.penthouseGSF*S.deptGrossPct))+'</td><td>'+F(S.penthouseGSF)+'</td><td colspan="6" style="font-weight:600;color:var(--clrSupport)">Building Support (MEP)</td></tr>';
  h += '</table>';

  // Net Area Breakdown by Scenario
  if (S.scenarios.length > 0) {
    h += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)">';
    h += '<div style="font-weight:700;color:var(--navy);font-size:.95rem;margin-bottom:4px">Net Area Breakdown by Scenario</div>';
    h += '<div style="font-size:.8rem;color:var(--mut);margin-bottom:10px">Percentage of total NASF allocated to each program category across scenarios.</div>';
    h += '<table class="comp"><tr><th style="min-width:140px">Category</th>';
    S.scenarios.forEach(function(sc, i) {
      var thBorder = i === S.activeScenario ? 'box-shadow:inset 0 -3px 0 #fff;' : '';
      h += '<th style="min-width:100px;cursor:pointer;'+thBorder+'" onclick="selectScenario('+i+')">'+sc.name.replace(/^\d+\s*\u2014\s*/,'')+'</th>';
    });
    h += '</tr>';

    var cats = [
      { label:'Open Lab + Lab Support', key:function(d){return d.bldgOpenLab+d.bldgLabSupport}, color:'var(--clrResearch)' },
      { label:'Write-Up / Desk', key:function(d){return d.bldgDesk}, color:'var(--clrResearch)' },
      { label:'Faculty Office', key:function(d){return d.bldgOffice}, color:FICM.office },
      { label:'Core Facilities', key:function(d){return d.coreNASF}, color:'var(--clrCore)' },
      { label:'Collaboration', key:function(d){return d.communityNASFActual}, color:'var(--clrCommunity)' },
      { label:'Event', key:function(d){return d.eventNASF}, color:'var(--clrEvent)' },
      { label:'Building Support', key:function(d){return d.gfSupport}, color:'var(--clrSupport)' },
    ];

    cats.forEach(function(cat, ci) {
      h += '<tr>';
      h += '<td style="font-weight:600"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+cat.color+';margin-right:6px;vertical-align:middle"></span>'+cat.label+'</td>';
      S.scenarios.forEach(function(sc, i) {
        var val = cat.key(sc.data);
        var pct = sc.data.totalNASF > 0 ? (val / sc.data.totalNASF * 100) : 0;
        var activeBg = i === S.activeScenario ? 'background:rgba(27,58,92,0.04);' : '';
        h += '<td style="text-align:center;'+activeBg+'"><span style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:.88rem">'+pct.toFixed(1)+'%</span><br><span style="font-size:.72rem;color:var(--mut)">'+F(val)+'</span></td>';
      });
      h += '</tr>';
    });

    // Totals row
    h += '<tr style="border-top:2px solid var(--navy)"><td style="font-weight:900;color:var(--navy)">Total Programmed</td>';
    S.scenarios.forEach(function(sc, i) {
      var util = sc.data.totalNASF > 0 ? (sc.data.totalDemand / sc.data.totalNASF * 100) : 0;
      var activeBg = i === S.activeScenario ? 'background:rgba(27,58,92,0.04);' : '';
      h += '<td style="text-align:center;'+activeBg+'"><span style="font-family:\'IBM Plex Mono\',monospace;font-weight:900;font-size:.88rem;color:var(--navy)">'+util.toFixed(1)+'%</span><br><span style="font-size:.72rem;color:var(--mut)">'+F(sc.data.totalDemand)+' / '+F(sc.data.totalNASF)+'</span></td>';
    });
    h += '</tr>';
    h += '</table></div>';

    // Exec summary: research floor % of departmental gross
    h += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid var(--bdr)">';
    h += '<div style="font-weight:700;color:var(--navy);font-size:.95rem;margin-bottom:4px">Upper Research Floor Mix (% of Dept. Gross)</div>';
    h += '<div style="font-size:.8rem;color:var(--mut);margin-bottom:10px">Program categories as percentage of departmental gross floor area (DGSF = GFA \u00d7 '+(S.deptGrossPct*100).toFixed(0)+'%) on a typical upper research floor.</div>';
    h += '<table class="comp"><tr><th style="min-width:140px">Category</th>';
    S.scenarios.forEach(function(sc, i) {
      var thBorder = i === S.activeScenario ? 'box-shadow:inset 0 -3px 0 #fff;' : '';
      h += '<th style="min-width:80px;cursor:pointer;'+thBorder+'" onclick="selectScenario('+i+')">'+sc.name.replace(/^\d+\s*\u2014\s*/,'')+'</th>';
    });
    h += '</tr>';

    var rfCats = [
      { label:'Lab (OL + LS)', color:'var(--clrResearch)', fn:function(sd,ss){ return sd.researchFloors>0 ? (sd.bldgOpenLab+sd.bldgLabSupport)/sd.researchFloors : 0; } },
      { label:'Write-Up / Desk', color:'var(--clrResearch)', fn:function(sd,ss){ return sd.researchFloors>0 ? sd.bldgDesk/sd.researchFloors : 0; } },
      { label:'Faculty Office', color:FICM.office, fn:function(sd,ss){ return sd.researchFloors>0 ? sd.bldgOffice/sd.researchFloors : 0; } },
      { label:'Core', color:'var(--clrCore)', fn:function(sd,ss){ var cs=ss.coreFloorSplit||{basement:1,ground:0,research:0}; return sd.researchFloors>0 ? sd.coreNASF*(cs.research||0)/sd.researchFloors : 0; } },
      { label:'Collaboration', color:'var(--clrCommunity)', fn:function(sd,ss){ return sd.upperCommunityPerFloor; } },
    ];

    rfCats.forEach(function(cat) {
      var anyNonZero = false;
      S.scenarios.forEach(function(sc){ if(cat.fn(sc.data,sc.state)>0) anyNonZero=true; });
      if (!anyNonZero && cat.label==='Core') return;
      h += '<tr>';
      h += '<td style="font-weight:600"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+cat.color+';margin-right:6px;vertical-align:middle"></span>'+cat.label+'</td>';
      S.scenarios.forEach(function(sc, i) {
        var val = Math.round(cat.fn(sc.data, sc.state));
        var dgsf = Math.round(sc.state.aboveGradeGSF * sc.state.deptGrossPct);
        var pct = dgsf > 0 ? (val / dgsf * 100) : 0;
        var activeBg = i === S.activeScenario ? 'background:rgba(27,58,92,0.04);' : '';
        h += '<td style="text-align:center;'+activeBg+'"><span style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:.88rem">'+pct.toFixed(0)+'%</span></td>';
      });
      h += '</tr>';
    });

    // Building Support row: DGSF minus all assigned NASF on research floor
    h += '<tr>';
    h += '<td style="font-weight:600"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:var(--clrSupport);margin-right:6px;vertical-align:middle"></span>Building Support</td>';
    S.scenarios.forEach(function(sc, i) {
      var dgsf = Math.round(sc.state.aboveGradeGSF * sc.state.deptGrossPct);
      var assigned = 0;
      rfCats.forEach(function(cat){ assigned += Math.round(cat.fn(sc.data, sc.state)); });
      var support = dgsf - assigned;
      var pct = dgsf > 0 ? (support / dgsf * 100) : 0;
      var activeBg = i === S.activeScenario ? 'background:rgba(27,58,92,0.04);' : '';
      h += '<td style="text-align:center;'+activeBg+'"><span style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;font-size:.88rem">'+pct.toFixed(0)+'%</span></td>';
    });
    h += '</tr>';

    // Total row
    h += '<tr style="border-top:2px solid var(--navy)"><td style="font-weight:900;color:var(--navy)">Dept. Gross / Floor</td>';
    S.scenarios.forEach(function(sc, i) {
      var dgsf = Math.round(sc.state.aboveGradeGSF * sc.state.deptGrossPct);
      var activeBg = i === S.activeScenario ? 'background:rgba(27,58,92,0.04);' : '';
      h += '<td style="text-align:center;'+activeBg+'"><span style="font-family:\'IBM Plex Mono\',monospace;font-weight:900;font-size:.88rem;color:var(--navy)">'+F(dgsf)+'</span></td>';
    });
    h += '</tr>';
    h += '</table></div>';
  }

  h += '</div>';

  return h;
}

function floorVis(label, segments, totalNASF, showNASF, floorGSF, maxFloorGSF, capacityNASF, piLabel) {
  // Bar width proportional to floor plate area (if provided)
  var barWidthPct = (floorGSF && maxFloorGSF) ? Math.round(floorGSF / maxFloorGSF * 100) : 100;
  var floorDGSF = Math.round(floorGSF * S.deptGrossPct);
  var isOver = capacityNASF && capacityNASF > 0 && totalNASF > capacityNASF;
  var h = '<div class="floor-row">';
  h += '<div class="floor-label"'+(isOver?' style="color:#E53935"':'')+'>'+label;
  if (piLabel) h += '<div style="font-size:.7rem;font-weight:400;color:var(--mut);margin-top:1px">'+piLabel+' PIs</div>';
  h += '</div>';
  h += '<div style="flex:1;display:flex;align-items:center;gap:8px">';
  h += '<div class="floor-bar" style="width:'+barWidthPct+'%;flex:none;position:relative'+(isOver?';box-shadow:inset 0 0 0 2px #E53935':'')+'">';
  segments.forEach(function(s) {
    var pct = totalNASF > 0 ? (s.nasf / totalNASF * 100) : 0;
    if (pct > 0.5) {
      h += '<div style="width:'+pct.toFixed(1)+'%;background:'+s.color+'" title="'+s.label+': '+F(Math.round(s.nasf))+' NASF">';
      if (pct > 8) h += '<span>'+s.label+'</span>';
      h += '</div>';
    }
  });
  // Capacity marker: red dashed line at the nominal NASF boundary
  if (isOver) {
    var capPct = (capacityNASF / totalNASF * 100).toFixed(1);
    h += '<div style="position:absolute;left:'+capPct+'%;top:-2px;bottom:-2px;width:0;border-left:2.5px dashed #E53935;z-index:2" title="Floor capacity: '+F(capacityNASF)+' NASF"></div>';
  }
  h += '</div></div>';
  if (showNASF) {
    var nasfColor = isOver ? '#E53935' : 'var(--navy)';
    h += '<div style="font-family:\'IBM Plex Mono\',monospace;font-size:.75rem;font-weight:600;min-width:155px;text-align:right;line-height:1.45">';
    h += '<span style="color:'+nasfColor+'">'+F(capacityNASF && capacityNASF > 0 ? capacityNASF : totalNASF)+'</span> <span style="color:var(--mut);font-weight:400">NASF</span><br>';
    h += '<span style="color:var(--teal)">'+F(floorDGSF)+'</span> <span style="color:var(--mut);font-weight:400">DGSF</span><br>';
    h += '<span style="color:var(--mut)">'+F(floorGSF)+'</span> <span style="color:var(--mut);font-weight:400">GFA</span>';
    h += '</div>';
  }
  h += '</div>';
  return h;
}

function setEUI(id, val) { S.energyEUI[id] = parseInt(val); render(); }

function renderEnergy(d) {
  // ── Build merged research-only energy breakdown (large labs distributed into constituent types) ──
  var mergedEnergy = [];
  var researchKBTU = 0;
  var largeEntry = null;
  d.energyBreakdown.forEach(function(e) {
    var isPI = S.types.some(function(t){return t.id===e.id});
    if (!isPI) return;
    if (e.id === 'custom_1775851246404') { largeEntry = e; return; }
    mergedEnergy.push({ id:e.id, label:e.label, color:e.color, nasf:e.nasf, euiVal:e.euiVal, kbtu:e.kbtu });
  });
  // Distribute large lab energy into constituent types
  if (largeEntry && largeEntry.kbtu > 0) {
    Object.keys(S.largeMix).forEach(function(k) {
      var share = S.largeMix[k];
      if (share <= 0) return;
      var addKBTU = largeEntry.kbtu * share;
      var existing = mergedEnergy.filter(function(m){return m.id===k})[0];
      if (existing) {
        existing.kbtu += addKBTU;
        existing.nasf += Math.round(largeEntry.nasf * share);
      }
    });
  }
  mergedEnergy.forEach(function(e){ researchKBTU += e.kbtu; });

  var h = '<div class="note-bl">Energy model focused on research typologies. Each type\u2019s benchmark EUI (kBTU/SF) is multiplied by its share of the total research program to estimate energy contribution. Large Lab energy is apportioned into constituent types per the building mix association. Building EUI = total energy \u00f7 total GSF.</div>';

  // Building-level EUI headline
  h += '<div class="card"><div class="card-title">Building Energy Summary</div>';
  h += '<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:baseline;margin-bottom:12px">';
  h += '<div><span style="font-size:2rem;font-weight:900;color:var(--navy)">'+F(Math.round(d.buildingEUI))+'</span> <span style="font-size:1rem;color:var(--mut)">kBTU / SF (Blended EUI)</span></div>';
  h += '<div><span style="font-size:1.4rem;font-weight:700;color:var(--navy)">'+F(Math.round(d.totalKBTU))+'</span> <span style="font-size:.85rem;color:var(--mut)">Total kBTU</span></div>';
  h += '<div><span style="font-size:1.4rem;font-weight:700;color:var(--navy)">'+F(d.totalGSF)+'</span> <span style="font-size:.85rem;color:var(--mut)">GSF</span></div>';
  h += '</div></div>';

  h += '<div class="g2">';

  // LEFT: EUI Benchmark Sliders (research types only, no building categories)
  h += '<div>';
  h += '<div class="card"><div class="card-title">Research Typology EUI Benchmarks</div>';
  h += '<div class="card-sub">Adjust kBTU/SF for each research type. Large Lab uses weighted EUI from constituent types.</div>';
  S.types.forEach(function(t) {
    if (t.id === 'custom_1775851246404') return; // skip Large Lab — uses weighted EUI
    var euiVal = S.energyEUI[t.id] || 0;
    h += '<label class="sl" style="color:'+t.color+'">'+t.label+'</label>';
    h += '<div class="sl-row"><input type="range" min="0" max="1000" step="10" value="'+euiVal+'" style="accent-color:'+t.color+'" oninput="setEUI(\''+t.id+'\',this.value)"><div class="sl-val" style="color:'+t.color+'">'+euiVal+' kBTU/SF</div></div>';
  });
  // Show computed Large Lab weighted EUI (read-only)
  var lgEUI = 0;
  Object.keys(S.largeMix).forEach(function(k){ lgEUI += S.largeMix[k] * (S.energyEUI[k]||0); });
  h += '<div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:8px;font-size:.88rem">';
  h += '<span style="font-weight:700;color:var(--navy)">Large Lab (computed): '+Math.round(lgEUI)+' kBTU/SF</span>';
  h += '<span style="color:var(--mut)"> \u2014 ' + Object.keys(S.largeMix).map(function(k){ var t = S.types.find(function(x){return x.id===k}); return Math.round(S.largeMix[k]*100)+'% '+(t?t.label:k); }).join(' + ') + '</span>';
  h += '</div>';
  h += '</div></div>';

  // RIGHT: Pie chart + summary table (research types only, % of energy)
  h += '<div>';

  // SVG Pie chart — Energy contribution by research typology
  h += '<div class="card"><div class="card-title">Energy Contribution by Research Typology</div>';
  h += '<div class="card-sub">Share of total research energy from each lab type. The programmatic mix drives the building\u2019s energy profile.</div>';
  var pieSize = 260, pieR = 100, pieC = pieSize/2;
  h += '<div style="display:flex;flex-wrap:wrap;gap:24px;align-items:center;justify-content:center">';
  h += '<svg width="'+pieSize+'" height="'+pieSize+'" style="flex:0 0 auto">';
  var startAngle = -Math.PI/2;
  mergedEnergy.forEach(function(e) {
    if (e.kbtu <= 0 || researchKBTU <= 0) return;
    var sliceAngle = (e.kbtu / researchKBTU) * 2 * Math.PI;
    var endAngle = startAngle + sliceAngle;
    var x1 = pieC + pieR * Math.cos(startAngle);
    var y1 = pieC + pieR * Math.sin(startAngle);
    var x2 = pieC + pieR * Math.cos(endAngle);
    var y2 = pieC + pieR * Math.sin(endAngle);
    var largeArc = sliceAngle > Math.PI ? 1 : 0;
    var pathD = 'M'+pieC+','+pieC+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+pieR+','+pieR+' 0 '+largeArc+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z';
    h += '<path d="'+pathD+'" fill="'+e.color+'" opacity="0.85" stroke="#fff" stroke-width="2">';
    h += '<title>'+e.label+': '+Math.round(e.kbtu/researchKBTU*100)+'% of research energy</title></path>';
    // Label in the middle of the slice (for large enough slices)
    var pctE = e.kbtu / researchKBTU * 100;
    if (pctE > 6) {
      var midAngle = startAngle + sliceAngle / 2;
      var lx = pieC + pieR * 0.6 * Math.cos(midAngle);
      var ly = pieC + pieR * 0.6 * Math.sin(midAngle);
      h += '<text x="'+lx.toFixed(1)+'" y="'+ly.toFixed(1)+'" text-anchor="middle" dominant-baseline="middle" fill="#fff" font-size="11" font-weight="700" font-family="\'IBM Plex Mono\',monospace">'+Math.round(pctE)+'%</text>';
    }
    startAngle = endAngle;
  });
  h += '</svg>';

  // Legend beside pie
  h += '<div style="flex:1;min-width:180px">';
  mergedEnergy.forEach(function(e) {
    var pct = researchKBTU > 0 ? (e.kbtu / researchKBTU * 100) : 0;
    if (pct <= 0) return;
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
    h += '<div style="width:12px;height:12px;border-radius:3px;background:'+e.color+';flex:none"></div>';
    h += '<span style="flex:1;font-size:.85rem;font-weight:600;color:var(--navy)">'+e.label+'</span>';
    h += '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:.85rem;font-weight:700;color:var(--navy)">'+pct.toFixed(1)+'%</span>';
    h += '</div>';
  });
  h += '</div></div></div>';

  // Summary table — research types only, no SF, focus on % energy
  h += '<div class="card"><div class="card-title">Research Energy Breakdown</div>';
  h += '<table class="comp"><tr><th>Research Typology</th><th>EUI (kBTU/SF)</th><th>% of Research Area</th><th>% of Research Energy</th></tr>';
  var totalResNASF = 0;
  mergedEnergy.forEach(function(e){ totalResNASF += e.nasf; });
  mergedEnergy.forEach(function(e) {
    if (e.kbtu <= 0) return;
    var pctArea = totalResNASF > 0 ? (e.nasf / totalResNASF * 100) : 0;
    var pctEnergy = researchKBTU > 0 ? (e.kbtu / researchKBTU * 100) : 0;
    h += '<tr><td style="font-weight:600"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;background:'+e.color+';margin-right:6px"></span>'+e.label+'</td>';
    h += '<td>'+e.euiVal+'</td>';
    h += '<td>'+pctArea.toFixed(1)+'%</td>';
    h += '<td style="font-weight:700">'+pctEnergy.toFixed(1)+'%</td></tr>';
  });
  h += '<tr style="border-top:3px solid var(--navy)"><td style="font-weight:900">Total Research</td><td></td><td style="font-weight:700">100%</td><td style="font-weight:900">100%</td></tr>';
  h += '</table></div>';

  h += '</div>'; // close right col
  h += '</div>'; // close g2

  // ── SCENARIO ENERGY COMPARISON ──
  if (S.scenarios.length > 0) {
    h += '<div class="card"><div class="card-title">Energy Comparison Across Scenarios</div>';
    h += '<div class="card-sub">How building energy changes under different programming assumptions. EUI benchmarks are held constant \u2014 differences arise from the research mix.</div>';
    h += '<div style="overflow-x:auto">';
    h += '<table class="comp"><tr><th style="min-width:200px">Metric</th>';
    S.scenarios.forEach(function(sc, i) {
      var bg = i === S.activeScenario ? 'background:rgba(27,58,92,0.06)' : '';
      h += '<th style="min-width:130px;'+bg+'">'+sc.name+'</th>';
    });
    h += '</tr>';

    var eRows = [
      { label:'Blended Building EUI (kBTU/SF)', key:function(sc){return F(Math.round(sc.data.buildingEUI||0))}, bold:true },
      { label:'Total Energy (kBTU)', key:function(sc){return F(Math.round(sc.data.totalKBTU||0))}, bold:true },
    ];

    // Research subtotal
    eRows.push({ label:'<strong>Research Energy (kBTU)</strong>', key:function(sc){
      var sub = 0;
      (sc.data.energyBreakdown||[]).forEach(function(e){
        if (sc.state.types.some(function(t){return t.id===e.id})) sub += e.kbtu||0;
      });
      return '<strong>'+F(Math.round(sub))+'</strong>';
    }, bold:true });

    // Per-type % of research energy (merged, with large lab distributed)
    // Use the non-large types
    S.types.forEach(function(t) {
      if (t.id === 'custom_1775851246404') return;
      eRows.push({ label:'&emsp;'+t.label+' (% energy)', key:function(sc){
        var resKBTU = 0;
        var typeKBTU = 0;
        var lgKBTU = 0;
        (sc.data.energyBreakdown||[]).forEach(function(e){
          if (sc.state.types.some(function(x){return x.id===e.id})) {
            resKBTU += e.kbtu||0;
            if (e.id === t.id) typeKBTU = e.kbtu||0;
            if (e.id === 'custom_1775851246404') lgKBTU = e.kbtu||0;
          }
        });
        // Add large lab share
        var lgShare = (sc.state.largeMix||S.largeMix)[t.id] || 0;
        typeKBTU += lgKBTU * lgShare;
        return resKBTU > 0 ? (typeKBTU/resKBTU*100).toFixed(1)+'%' : '\u2014';
      }, bold:false });
    });

    // EUI per person
    eRows.push({ label:'kBTU / Person', key:function(sc){
      var pop = calcPopulation(sc);
      return pop.total > 0 ? F(Math.round((sc.data.totalKBTU||0)/pop.total)) : '\u2014';
    }, bold:true });

    eRows.forEach(function(r){
      h += '<tr><td style="font-weight:'+(r.bold?'900':'600')+'">'+r.label+'</td>';
      S.scenarios.forEach(function(sc, i) {
        var val = r.key(sc);
        var bg = i === S.activeScenario ? 'background:rgba(27,58,92,0.06)' : '';
        h += '<td style="font-weight:'+(r.bold?'700':'500')+';color:var(--navy);'+bg+'">'+val+'</td>';
      });
      h += '</tr>';
    });
    h += '</table></div>';

    // Visual: EUI bar chart per scenario
    h += '<div style="margin-top:16px">';
    var maxEUI = Math.max.apply(null, S.scenarios.map(function(sc){return sc.data.buildingEUI||0}));
    var maxKBTU = Math.max.apply(null, S.scenarios.map(function(sc){return sc.data.totalKBTU||0}));
    S.scenarios.forEach(function(sc, i) {
      var eui = sc.data.buildingEUI||0;
      var kbtu = sc.data.totalKBTU||0;
      var pctBar = maxKBTU > 0 ? (kbtu / maxKBTU * 100) : 0;
      var isActive = i === S.activeScenario;
      h += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">';
      h += '<div style="min-width:180px;font-size:.82rem;font-weight:'+(isActive?'800':'600')+';color:var(--navy);text-align:right">'+sc.name.replace(/^\d+ \u2014 /,'')+'</div>';
      h += '<div style="flex:1;height:28px;background:#eee;border-radius:6px;overflow:hidden">';
      var hue = Math.max(0, 120 - (eui / Math.max(maxEUI,1)) * 120);
      h += '<div style="width:'+pctBar.toFixed(1)+'%;height:100%;background:hsl('+hue+',65%,50%);border-radius:6px;display:flex;align-items:center;padding:0 10px">';
      if (pctBar > 15) h += '<span style="font-size:.72rem;font-weight:700;color:#fff">'+F(Math.round(eui))+' kBTU/SF</span>';
      h += '</div></div>';
      h += '<div style="min-width:90px;font-family:\'IBM Plex Mono\',monospace;font-size:.85rem;font-weight:800;color:var(--navy)">'+F(Math.round(eui))+' kBTU/SF</div>';
      h += '</div>';
    });
    h += '</div>';

    h += '</div>';
  }

  return h;
}

// ============================================================
// TAB 9: COST
// ============================================================
function setCost(key, val) { S.cost[key] = parseFloat(val); render(); }
function setCostInt(key, val) { S.cost[key] = parseInt(val); render(); }
function setTypeRate(id, val) { S.cost.typeRates[id] = parseInt(val); render(); }
function setCoreRate(name, val) { S.cost.coreRates[name] = parseInt(val); render(); }
function setDeptGross(val) { S.deptGrossPct = parseFloat(val); render(); }
function setBasementResearch(val) { S.basementResearchPct = parseFloat(val); render(); }
function FM(n) { return '$' + F(Math.round(n)); }
function FMM(n) { var m = n / 1000000; return '$' + (m >= 100 ? F(Math.round(m)) : m.toFixed(1)) + 'M'; }

function renderCost(d) {
  var cs = d.cost;
  var h = '<div class="note-bl">Cost model based on <strong>Vermeulens Construction Economists</strong> (Q4 2025 base, Evanston IL, CMAR). Core &amp; Shell and Site are applied to total GSF. Program fitout rates are per space type, applied to each type\u2019s GFA (NASF \u00d7 DGSF factor). Escalation, tariff, and soft costs are layered sequentially.</div>';

  // Summary headline
  h += '<div class="card"><div class="card-title">Cost Summary</div>';
  h += '<div style="display:flex;gap:20px;flex-wrap:wrap;align-items:baseline">';
  h += '<div><span style="font-size:2rem;font-weight:900;color:var(--navy)">'+FMM(cs.projectCost)+'</span> <span style="font-size:.9rem;color:var(--mut)">Total Project Cost</span></div>';
  h += '<div><span style="font-size:1.3rem;font-weight:700;color:var(--navy)">'+FMM(cs.postTariff)+'</span> <span style="font-size:.85rem;color:var(--mut)">Construction (Q4 '+S.cost.escalationYear+')</span></div>';
  h += '<div><span style="font-size:1.3rem;font-weight:700;color:var(--navy)">'+FMM(cs.constructionCost)+'</span> <span style="font-size:.85rem;color:var(--mut)">Base Construction (Q4 '+S.cost.baseYear+')</span></div>';
  h += '<div><span style="font-size:1.1rem;font-weight:600;color:var(--mut)">$'+F(Math.round(cs.constructionPerGSF))+'/GSF</span> <span style="font-size:.8rem;color:var(--mut)">(constr.)</span></div>';
  h += '<div><span style="font-size:1.1rem;font-weight:600;color:var(--mut)">$'+F(Math.round(cs.costPerGSF))+'/GSF</span> <span style="font-size:.8rem;color:var(--mut)">(project)</span></div>';
  h += '</div></div>';

  // ── DGSF MODEL ──
  h += '<div class="card"><div class="card-title">Departmental Gross (DGSF) Model</div>';
  h += '<div class="card-sub">DGSF = GSF \u00d7 Dept. Gross %. Program fitout rates are applied against each type\u2019s pro-rata GFA share.</div>';
  h += '<label class="sl">Departmental Gross % of GSF</label>';
  h += '<div class="sl-row"><input type="range" min="0.70" max="0.95" step="0.01" value="'+S.deptGrossPct+'" oninput="setDeptGross(this.value)"><div class="sl-val">'+(S.deptGrossPct*100).toFixed(0)+'%</div></div>';
  h += '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px;padding:12px;background:var(--bg);border-radius:10px;font-family:\'IBM Plex Mono\',monospace;font-size:.88rem">';
  h += '<div><span style="font-weight:700;color:var(--navy)">'+F(d.totalGSF)+'</span> <span style="color:var(--mut)">Total GSF</span></div>';
  h += '<div>\u2192 <span style="font-weight:700;color:var(--teal)">'+F(cs.dgsf)+'</span> <span style="color:var(--mut)">DGSF ('+(S.deptGrossPct*100).toFixed(0)+'%)</span></div>';
  h += '<div>+ <span style="font-weight:700;color:var(--navy)">'+F(cs.mepGSF)+'</span> <span style="color:var(--mut)">MEP/Infra ('+((1-S.deptGrossPct)*100).toFixed(0)+'%)</span></div>';
  h += '</div>';
  h += '<div style="margin-top:8px;font-size:.88rem;color:var(--mut)">NASF-to-GFA factor: <strong style="color:var(--navy)">' + cs.dgsfFactor.toFixed(3) + '\u00d7</strong> ('+F(d.totalNASF)+' NASF \u2192 '+F(cs.dgsf)+' DGSF)</div>';
  h += '</div>';

  // ── PROGRAM AREAS TABLE ──
  h += '<div class="card"><div class="card-title">Program Areas: NASF \u2192 GFA \u2192 Fitout Cost</div>';
  h += '<div class="card-sub">Vermeulens per-type rates ($/GFA). Each type\u2019s rate covers interiors, fit/equip, mechanical, electrical &amp; general requirements.</div>';
  h += '<div style="overflow-x:auto">';
  h += '<table class="comp"><tr><th style="min-width:200px">Program Category</th><th>NASF</th><th>GFA</th><th>$/GFA</th><th>Fitout Cost</th><th>% of Fitout</th></tr>';
  var totalProgNASF = 0, totalProgDGSF = 0;
  var resLines = cs.progLines.filter(function(p){return p.group==='research'});
  var coreLines = cs.progLines.filter(function(p){return p.group==='core'});
  var otherLines = cs.progLines.filter(function(p){return p.group==='other'});

  // Research PI typologies
  if (resLines.length > 0) {
    h += '<tr><td colspan="6" style="font-weight:800;color:var(--navy);padding-top:10px;font-size:.82rem;text-transform:uppercase;letter-spacing:.03em;border-bottom:2px solid var(--bdr)">Research \u2014 PI Typologies</td></tr>';
    var resNASF=0, resDGSF=0, resCost=0;
    resLines.forEach(function(p) {
      resNASF += p.nasf; resDGSF += p.dgsf; resCost += p.cost;
      var pct = cs.totalFitout > 0 ? (p.cost / cs.totalFitout * 100).toFixed(1) + '%' : '\u2014';
      var dot = p.color ? '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:'+p.color+';margin-right:6px;vertical-align:middle"></span>' : '';
      h += '<tr><td style="font-weight:600">'+dot+p.cat+'</td><td>'+F(p.nasf)+'</td><td>'+F(p.dgsf)+'</td><td>$'+F(p.rate)+'</td><td>'+FMM(p.cost)+'</td><td>'+pct+'</td></tr>';
    });
    h += '<tr style="background:var(--bg);font-weight:700"><td style="padding-left:16px">Subtotal: PI Typologies</td><td>'+F(resNASF)+'</td><td>'+F(resDGSF)+'</td><td></td><td>'+FMM(resCost)+'</td><td>'+(cs.totalFitout>0?(resCost/cs.totalFitout*100).toFixed(1)+'%':'\u2014')+'</td></tr>';
    totalProgNASF += resNASF; totalProgDGSF += resDGSF;
  }

  // Core facility items
  if (coreLines.length > 0) {
    h += '<tr><td colspan="6" style="font-weight:800;color:var(--navy);padding-top:10px;font-size:.82rem;text-transform:uppercase;letter-spacing:.03em;border-bottom:2px solid var(--bdr)">Core Facilities</td></tr>';
    var coreNASFTot=0, coreDGSFTot=0, coreCostTot=0;
    coreLines.forEach(function(p) {
      coreNASFTot += p.nasf; coreDGSFTot += p.dgsf; coreCostTot += p.cost;
      var pct = cs.totalFitout > 0 ? (p.cost / cs.totalFitout * 100).toFixed(1) + '%' : '\u2014';
      h += '<tr><td style="font-weight:600;padding-left:16px">'+p.cat+'</td><td>'+F(p.nasf)+'</td><td>'+F(p.dgsf)+'</td><td>$'+F(p.rate)+'</td><td>'+FMM(p.cost)+'</td><td>'+pct+'</td></tr>';
    });
    h += '<tr style="background:var(--bg);font-weight:700"><td style="padding-left:16px">Subtotal: Core Facilities</td><td>'+F(coreNASFTot)+'</td><td>'+F(coreDGSFTot)+'</td><td></td><td>'+FMM(coreCostTot)+'</td><td>'+(cs.totalFitout>0?(coreCostTot/cs.totalFitout*100).toFixed(1)+'%':'\u2014')+'</td></tr>';
    totalProgNASF += coreNASFTot; totalProgDGSF += coreDGSFTot;
  }

  // Other: community, event, support
  if (otherLines.length > 0) {
    h += '<tr><td colspan="6" style="font-weight:800;color:var(--navy);padding-top:10px;font-size:.82rem;text-transform:uppercase;letter-spacing:.03em;border-bottom:2px solid var(--bdr)">Non-Research Program</td></tr>';
    var otherNASF=0, otherDGSF=0, otherCost=0;
    otherLines.forEach(function(p) {
      otherNASF += p.nasf; otherDGSF += p.dgsf; otherCost += p.cost;
      var pct = cs.totalFitout > 0 ? (p.cost / cs.totalFitout * 100).toFixed(1) + '%' : '\u2014';
      h += '<tr><td style="font-weight:600">'+p.cat+'</td><td>'+F(p.nasf)+'</td><td>'+F(p.dgsf)+'</td><td>$'+F(p.rate)+'</td><td>'+FMM(p.cost)+'</td><td>'+pct+'</td></tr>';
    });
    totalProgNASF += otherNASF; totalProgDGSF += otherDGSF;
  }

  h += '<tr style="border-top:3px solid var(--teal);font-weight:900;color:var(--teal)"><td>Fitout Total</td><td>'+F(totalProgNASF)+'</td><td>'+F(totalProgDGSF)+'</td><td></td><td>'+FMM(cs.totalFitout)+'</td><td>100%</td></tr>';
  h += '<tr style="border-top:2px solid var(--navy);font-weight:700"><td>Core &amp; Shell</td><td colspan="2">'+F(d.totalGSF)+' GSF</td><td>$'+F(S.cost.coreShellRate)+'</td><td>'+FMM(cs.totalCoreShell)+'</td><td></td></tr>';
  h += '<tr style="font-weight:700"><td>Site &amp; Demo</td><td colspan="2">'+F(d.totalGSF)+' GSF</td><td>$'+F(S.cost.siteRate)+'</td><td>'+FMM(cs.totalSite)+'</td><td></td></tr>';
  h += '<tr style="border-top:3px solid var(--navy);font-weight:900"><td>Base Construction (Q4 '+S.cost.baseYear+')</td><td colspan="2">'+F(d.totalGSF)+' GSF</td><td>$'+F(Math.round(cs.constructionCost/d.totalGSF))+'</td><td>'+FMM(cs.constructionCost)+'</td><td></td></tr>';
  h += '</table></div></div>';

  h += '<div class="g2">';

  // LEFT COLUMN: Rate controls
  h += '<div>';

  // Core & Shell + Site rates
  h += '<div class="card"><div class="card-title">Core &amp; Shell + Site</div>';
  h += '<div class="card-sub">Applied to total GSF ('+F(d.totalGSF)+' SF). Covers structure, enclosure, base MEP, and site work.</div>';
  h += '<label class="sl">Core &amp; Shell ($/GSF)</label>';
  h += '<div class="sl-row"><input type="range" min="400" max="1400" step="10" value="'+S.cost.coreShellRate+'" oninput="setCostInt(\'coreShellRate\',this.value)"><div class="sl-val">$'+F(S.cost.coreShellRate)+'/SF</div></div>';
  h += '<div style="font-size:.82rem;color:var(--mut);text-align:right">= '+FMM(cs.totalCoreShell)+'</div>';
  h += '<label class="sl">Site &amp; Demo ($/GSF)</label>';
  h += '<div class="sl-row"><input type="range" min="0" max="200" step="5" value="'+S.cost.siteRate+'" oninput="setCostInt(\'siteRate\',this.value)"><div class="sl-val">$'+S.cost.siteRate+'/SF</div></div>';
  h += '<div style="font-size:.82rem;color:var(--mut);text-align:right">= '+FMM(cs.totalSite)+'</div>';
  h += '</div>';

  // PI Typology Rates (Vermeulens per-type)
  h += '<div class="card"><div class="card-title">PI Typology Fitout Rates ($/GFA)</div>';
  h += '<div class="card-sub">Vermeulens per-type rates. Each includes interiors, fit/equip, MEP &amp; general requirements.</div>';
  S.types.forEach(function(t) {
    var rate = S.cost.typeRates[t.id] || 538;
    h += '<label class="sl" style="color:'+t.color+'">'+t.label+'</label>';
    h += '<div class="sl-row"><input type="range" min="200" max="1200" step="10" value="'+rate+'" oninput="setTypeRate(\''+t.id+'\',this.value)"><div class="sl-val">$'+F(rate)+'/SF</div></div>';
  });
  h += '</div>';

  // Core Facility Rates
  h += '<div class="card"><div class="card-title">Core Facility Rates ($/GFA)</div>';
  h += '<div class="card-sub">Individual rates per Vermeulens analysis. Cleanroom/Fabrication is the cost driver.</div>';
  S.coreItems.forEach(function(c) {
    if (!c.on) return;
    var rate = S.cost.coreRates[c.name] || 538;
    h += '<label class="sl">'+c.name+'</label>';
    h += '<div class="sl-row"><input type="range" min="200" max="2500" step="10" value="'+rate+'" oninput="setCoreRate(\''+c.name+'\',this.value)"><div class="sl-val">$'+F(rate)+'/SF</div></div>';
  });
  h += '</div>';

  // Non-Research Rates
  h += '<div class="card"><div class="card-title">Non-Research Rates ($/GFA)</div>';
  var nonResRates = [
    {key:'communityRate', label:'Community', min:100, max:800, step:10},
    {key:'eventRate', label:'Event', min:100, max:800, step:10},
    {key:'supportRate', label:'Support', min:50, max:600, step:10},
  ];
  nonResRates.forEach(function(s) {
    h += '<label class="sl">'+s.label+'</label>';
    h += '<div class="sl-row"><input type="range" min="'+s.min+'" max="'+s.max+'" step="'+s.step+'" value="'+S.cost[s.key]+'" oninput="setCostInt(\''+s.key+'\',this.value)"><div class="sl-val">$'+S.cost[s.key]+'/SF</div></div>';
  });
  h += '<div style="font-weight:700;font-size:.95rem;padding-top:6px;border-top:2px solid var(--bdr);text-align:right">Fitout Total: '+FMM(cs.totalFitout)+'</div>';
  h += '</div>';

  h += '</div>'; // close left col

  // RIGHT COLUMN: Escalation, Tariff, Soft Costs, Waterfall
  h += '<div>';

  // Escalation
  h += '<div class="card"><div class="card-title">Escalation</div>';
  h += '<div class="card-sub">Compound annual escalation from Q'+S.cost.baseQuarter+' '+S.cost.baseYear+' to Q'+S.cost.escalationQuarter+' '+S.cost.escalationYear+'</div>';
  h += '<label class="sl">Cost Basis Year</label>';
  h += '<div class="sl-row"><input type="range" min="2024" max="2028" step="1" value="'+S.cost.baseYear+'" oninput="setCostInt(\'baseYear\',this.value)"><div class="sl-val">'+S.cost.baseYear+'</div></div>';
  h += '<label class="sl">Midpoint Year</label>';
  h += '<div class="sl-row"><input type="range" min="2025" max="2032" step="1" value="'+S.cost.escalationYear+'" oninput="setCostInt(\'escalationYear\',this.value)"><div class="sl-val">'+S.cost.escalationYear+'</div></div>';
  h += '<label class="sl">Midpoint Quarter</label>';
  h += '<div class="sl-row"><input type="range" min="1" max="4" step="1" value="'+S.cost.escalationQuarter+'" oninput="setCostInt(\'escalationQuarter\',this.value)"><div class="sl-val">Q'+S.cost.escalationQuarter+'</div></div>';
  h += '<label class="sl">Annual Escalation Rate</label>';
  h += '<div class="sl-row"><input type="range" min="0" max="0.12" step="0.005" value="'+S.cost.escalationRate+'" oninput="setCost(\'escalationRate\',this.value)"><div class="sl-val">'+(S.cost.escalationRate*100).toFixed(1)+'%</div></div>';
  h += '<div style="margin-top:8px;padding:10px;background:var(--bg);border-radius:8px;font-family:\'IBM Plex Mono\',monospace;font-size:.85rem">';
  h += '<div>'+cs.yearsToMid.toFixed(2)+' years \u00d7 '+(S.cost.escalationRate*100).toFixed(1)+'%/yr = <strong>'+((cs.escalationFactor-1)*100).toFixed(1)+'% escalation</strong></div>';
  h += '<div style="margin-top:4px">Base: '+FMM(cs.constructionCost)+' \u2192 Escalated: <strong>'+FMM(cs.escalatedConstruction)+'</strong></div>';
  h += '</div></div>';

  // Tariff
  h += '<div class="card"><div class="card-title">Tariff Premium</div>';
  h += '<div class="card-sub">Applied after escalation to account for tariff impacts on materials</div>';
  h += '<label class="sl">Tariff Premium</label>';
  h += '<div class="sl-row"><input type="range" min="0" max="0.10" step="0.005" value="'+S.cost.tariffPct+'" oninput="setCost(\'tariffPct\',this.value)"><div class="sl-val">'+(S.cost.tariffPct*100).toFixed(1)+'%</div></div>';
  h += '<div style="font-size:.85rem;color:var(--mut)">Tariff adder: '+FMM(cs.tariffCost)+' \u2192 Post-tariff: <strong>'+FMM(cs.postTariff)+'</strong></div>';
  h += '</div>';

  // Soft Costs
  h += '<div class="card"><div class="card-title">Soft Costs</div>';
  h += '<div class="card-sub">Multiplier applied to post-tariff construction cost (design, contingency, admin, etc.)</div>';
  h += '<label class="sl">Soft Cost Multiplier</label>';
  h += '<div class="sl-row"><input type="range" min="1.0" max="2.0" step="0.05" value="'+S.cost.softMultiplier+'" oninput="setCost(\'softMultiplier\',this.value)"><div class="sl-val">'+S.cost.softMultiplier.toFixed(2)+'x</div></div>';
  h += '<div style="font-size:.85rem;color:var(--mut)">Soft costs = '+(((S.cost.softMultiplier-1)*100).toFixed(0))+'% of construction ('+ FMM(cs.postTariff * (S.cost.softMultiplier - 1)) +')</div>';
  h += '<div style="font-weight:700;font-size:1.1rem;margin-top:8px;color:var(--navy)">Total Project Cost: '+FMM(cs.projectCost)+'</div>';
  h += '</div>';

  // Full cost waterfall
  h += '<div class="card"><div class="card-title">Cost Waterfall</div>';
  h += '<table class="comp"><tr><th>Step</th><th>$/GSF</th><th>Amount</th></tr>';
  h += '<tr><td style="font-weight:600">Core &amp; Shell</td><td>$'+F(S.cost.coreShellRate)+'</td><td>'+FMM(cs.totalCoreShell)+'</td></tr>';
  h += '<tr><td style="font-weight:600">+ Program Fitout</td><td>$'+F(d.totalGSF>0?Math.round(cs.totalFitout/d.totalGSF):0)+'</td><td>'+FMM(cs.totalFitout)+'</td></tr>';
  h += '<tr><td style="font-weight:600">+ Site &amp; Demo</td><td>$'+F(S.cost.siteRate)+'</td><td>'+FMM(cs.totalSite)+'</td></tr>';
  h += '<tr style="border-top:3px solid var(--navy);font-weight:900"><td>= Base Construction (Q4 '+S.cost.baseYear+')</td><td>$'+F(d.totalGSF>0?Math.round(cs.constructionCost/d.totalGSF):0)+'</td><td>'+FMM(cs.constructionCost)+'</td></tr>';
  h += '<tr><td style="font-weight:600">+ Escalation ('+((cs.escalationFactor-1)*100).toFixed(1)+'%)</td><td></td><td>'+FMM(cs.escalatedConstruction - cs.constructionCost)+'</td></tr>';
  h += '<tr><td style="font-weight:600">+ Tariff ('+(cs.tariffPct*100).toFixed(0)+'%)</td><td></td><td>'+FMM(cs.tariffCost)+'</td></tr>';
  h += '<tr style="font-weight:700;border-top:2px solid var(--bdr)"><td>= Construction (Q4 '+S.cost.escalationYear+')</td><td>$'+F(d.totalGSF>0?Math.round(cs.postTariff/d.totalGSF):0)+'</td><td>'+FMM(cs.postTariff)+'</td></tr>';
  h += '<tr><td style="font-weight:600">+ Soft Costs ('+((S.cost.softMultiplier-1)*100).toFixed(0)+'%)</td><td></td><td>'+FMM(cs.postTariff*(S.cost.softMultiplier-1))+'</td></tr>';
  h += '<tr style="border-top:3px solid var(--navy);font-weight:900"><td>= Total Project Cost</td><td>$'+F(d.totalGSF>0?Math.round(cs.projectCost/d.totalGSF):0)+'</td><td style="font-size:1.1rem">'+FMM(cs.projectCost)+'</td></tr>';
  h += '</table></div>';

  // Stacked bar: C&S / Fitout / Site proportions
  h += '<div class="card"><div class="card-title">Base Construction Split (Q4 '+S.cost.baseYear+')</div>';
  var csPct = cs.constructionCost > 0 ? (cs.totalCoreShell / cs.constructionCost * 100) : 0;
  var fitPct = cs.constructionCost > 0 ? (cs.totalFitout / cs.constructionCost * 100) : 0;
  var sitePct = 100 - csPct - fitPct;
  h += '<div class="bar-budget" style="height:38px;font-family:\'IBM Plex Mono\',monospace">';
  h += '<div style="width:'+csPct.toFixed(1)+'%;background:var(--navy);display:flex;align-items:center;justify-content:center;overflow:hidden"><span style="font-size:.65rem;font-weight:700;color:#fff;white-space:nowrap">C&S '+Math.round(csPct)+'%</span></div>';
  h += '<div style="width:'+fitPct.toFixed(1)+'%;background:var(--teal);display:flex;align-items:center;justify-content:center;overflow:hidden"><span style="font-size:.65rem;font-weight:700;color:#fff;white-space:nowrap">Fitout '+Math.round(fitPct)+'%</span></div>';
  h += '<div style="width:'+Math.max(sitePct,0).toFixed(1)+'%;background:var(--coral);display:flex;align-items:center;justify-content:center;overflow:hidden"><span style="font-size:.65rem;font-weight:700;color:#fff;white-space:nowrap">Site '+Math.round(sitePct)+'%</span></div>';
  h += '</div></div>';

  h += '</div>'; // close right col
  h += '</div>'; // close g2

  // ── SCENARIO COMPARISON: STACKED BAR CHARTS (Area + Cost) ──
  if (S.scenarios.length > 0) {
    h += renderCostScenarioCharts();
  }

  return h;
}

function renderCostScenarioCharts() {
  var scenarios = S.scenarios;
  if (scenarios.length === 0) return '';

  // Build unified category list for all scenarios
  // Categories: each PI typology, Core (aggregated), Community, Event, Support, C&S, Site
  var CAT_COLORS = {};
  S.types.forEach(function(t) { CAT_COLORS[t.id] = t.color; });
  CAT_COLORS['core'] = 'var(--clrCore)';
  CAT_COLORS['community'] = 'var(--clrCommunity)';
  CAT_COLORS['event'] = 'var(--clrEvent)';
  CAT_COLORS['support'] = 'var(--clrSupport)';
  CAT_COLORS['coreshell'] = 'var(--navy)';
  CAT_COLORS['site'] = 'var(--coral)';

  var CAT_LABELS = {};
  S.types.forEach(function(t) { CAT_LABELS[t.id] = t.label; });
  CAT_LABELS['core'] = 'Core Facilities';
  CAT_LABELS['community'] = 'Community';
  CAT_LABELS['event'] = 'Event';
  CAT_LABELS['support'] = 'Support';
  CAT_LABELS['coreshell'] = 'Core & Shell';
  CAT_LABELS['site'] = 'Site & Demo';

  // Ordered category keys for consistent stacking
  var catKeys = S.types.map(function(t){return t.id}).concat(['core','community','event','support']);
  var costCatKeys = catKeys.concat(['coreshell','site']);

  // Extract per-scenario data
  var scData = scenarios.map(function(sc) {
    var dd = sc.data;
    var cc = dd.cost;
    var areaByType = {};
    var costByType = {};

    // PI typologies from progLines (research group)
    cc.progLines.forEach(function(p) {
      if (p.group === 'research') {
        // Match back to type id by label
        var tid = null;
        S.types.forEach(function(t){ if (t.label === p.cat) tid = t.id; });
        if (tid) {
          areaByType[tid] = (areaByType[tid]||0) + p.dgsf;
          costByType[tid] = (costByType[tid]||0) + p.cost;
        }
      }
    });

    // Core (aggregate all core lines)
    var coreArea = 0, coreCost = 0;
    cc.progLines.forEach(function(p) {
      if (p.group === 'core') { coreArea += p.dgsf; coreCost += p.cost; }
    });
    areaByType['core'] = coreArea;
    costByType['core'] = coreCost;

    // Non-research
    cc.progLines.forEach(function(p) {
      if (p.group === 'other') {
        var key = p.cat.toLowerCase();
        areaByType[key] = p.dgsf;
        costByType[key] = p.cost;
      }
    });

    // C&S and Site (cost only — not area-based in the same way)
    costByType['coreshell'] = cc.totalCoreShell;
    costByType['site'] = cc.totalSite;

    return { name:sc.name, areaByType:areaByType, costByType:costByType,
             totalGSF:dd.totalGSF, constructionCost:cc.constructionCost, postTariff:cc.postTariff, projectCost:cc.projectCost };
  });

  // Find max values for scaling
  var maxArea = 0, maxCost = 0;
  scData.forEach(function(sc) {
    var aSum = 0; catKeys.forEach(function(k){ aSum += sc.areaByType[k]||0; });
    var cSum = 0; costCatKeys.forEach(function(k){ cSum += sc.costByType[k]||0; });
    if (aSum > maxArea) maxArea = aSum;
    if (cSum > maxCost) maxCost = cSum;
  });

  var h = '<div class="card"><div class="card-title">Scenario Comparison: Program Area (GFA)</div>';
  h += '<div class="card-sub">Stacked by space type. GFA = NASF \u00d7 DGSF factor. Hover for detail.</div>';

  // SVG stacked bar chart — Area
  var barW = 90, barGap = 24, chartH = 280, padL = 60, padR = 20, padT = 30, padB = 80;
  var nBars = scData.length;
  var svgW = padL + nBars * (barW + barGap) + padR;
  h += '<div style="overflow-x:auto"><svg width="'+svgW+'" height="'+(chartH+padT+padB)+'" style="font-family:\'IBM Plex Mono\',monospace;font-size:10px">';

  // Y-axis labels
  for (var yi = 0; yi <= 4; yi++) {
    var yVal = maxArea * yi / 4;
    var yPos = padT + chartH - (chartH * yi / 4);
    h += '<text x="'+(padL-6)+'" y="'+(yPos+3)+'" text-anchor="end" fill="var(--mut)" font-size="9">'+F(Math.round(yVal))+'</text>';
    h += '<line x1="'+padL+'" y1="'+yPos+'" x2="'+(svgW-padR)+'" y2="'+yPos+'" stroke="var(--bdr)" stroke-dasharray="3,3"/>';
  }

  scData.forEach(function(sc, si) {
    var x = padL + si * (barW + barGap);
    var yOffset = 0;
    catKeys.forEach(function(k) {
      var val = sc.areaByType[k] || 0;
      if (val <= 0) return;
      var segH = maxArea > 0 ? (val / maxArea) * chartH : 0;
      var yTop = padT + chartH - yOffset - segH;
      h += '<rect x="'+x+'" y="'+yTop.toFixed(1)+'" width="'+barW+'" height="'+Math.max(segH,0.5).toFixed(1)+'" fill="'+CAT_COLORS[k]+'" opacity="0.85">';
      h += '<title>'+(CAT_LABELS[k]||k)+': '+F(val)+' GFA</title></rect>';
      yOffset += segH;
    });
    // Total label on top
    var totalArea = 0; catKeys.forEach(function(k){totalArea += sc.areaByType[k]||0;});
    h += '<text x="'+(x+barW/2)+'" y="'+(padT+chartH-yOffset-5)+'" text-anchor="middle" font-weight="700" font-size="10" fill="var(--navy)">'+F(totalArea)+'</text>';
    // Scenario label (bottom, rotated)
    h += '<text x="'+(x+barW/2)+'" y="'+(padT+chartH+14)+'" text-anchor="middle" font-size="9" fill="var(--navy)" font-weight="600">'+sc.name.replace(/\s*\u2014\s*/,' ')+'</text>';
  });
  h += '</svg></div></div>';

  // ── COST STACKED BAR ──
  h += '<div class="card"><div class="card-title">Scenario Comparison: Construction Cost (Q4 '+S.cost.baseYear+')</div>';
  h += '<div class="card-sub">Stacked by program fitout, core &amp; shell, and site. Base construction before escalation/tariff/soft costs.</div>';

  var svgW2 = padL + nBars * (barW + barGap) + padR;
  h += '<div style="overflow-x:auto"><svg width="'+svgW2+'" height="'+(chartH+padT+padB)+'" style="font-family:\'IBM Plex Mono\',monospace;font-size:10px">';

  // Y-axis labels (cost)
  for (var yi2 = 0; yi2 <= 4; yi2++) {
    var yVal2 = maxCost * yi2 / 4;
    var yPos2 = padT + chartH - (chartH * yi2 / 4);
    h += '<text x="'+(padL-6)+'" y="'+(yPos2+3)+'" text-anchor="end" fill="var(--mut)" font-size="9">'+FMM(yVal2)+'</text>';
    h += '<line x1="'+padL+'" y1="'+yPos2+'" x2="'+(svgW2-padR)+'" y2="'+yPos2+'" stroke="var(--bdr)" stroke-dasharray="3,3"/>';
  }

  scData.forEach(function(sc, si) {
    var x = padL + si * (barW + barGap);
    var yOffset = 0;
    costCatKeys.forEach(function(k) {
      var val = sc.costByType[k] || 0;
      if (val <= 0) return;
      var segH = maxCost > 0 ? (val / maxCost) * chartH : 0;
      var yTop = padT + chartH - yOffset - segH;
      h += '<rect x="'+x+'" y="'+yTop.toFixed(1)+'" width="'+barW+'" height="'+Math.max(segH,0.5).toFixed(1)+'" fill="'+CAT_COLORS[k]+'" opacity="0.85">';
      h += '<title>'+(CAT_LABELS[k]||k)+': '+FMM(val)+'</title></rect>';
      yOffset += segH;
    });
    // Total + $/GSF on top
    h += '<text x="'+(x+barW/2)+'" y="'+(padT+chartH-yOffset-12)+'" text-anchor="middle" font-weight="700" font-size="10" fill="var(--navy)">'+FMM(sc.constructionCost)+'</text>';
    h += '<text x="'+(x+barW/2)+'" y="'+(padT+chartH-yOffset-2)+'" text-anchor="middle" font-size="9" fill="var(--mut)">$'+F(sc.totalGSF>0?Math.round(sc.constructionCost/sc.totalGSF):0)+'/SF</text>';
    // Scenario label
    h += '<text x="'+(x+barW/2)+'" y="'+(padT+chartH+14)+'" text-anchor="middle" font-size="9" fill="var(--navy)" font-weight="600">'+sc.name.replace(/\s*\u2014\s*/,' ')+'</text>';
  });
  h += '</svg></div>';

  // Legend
  h += '<div style="display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:12px;padding:10px;background:var(--bg);border-radius:8px">';
  costCatKeys.forEach(function(k) {
    h += '<div style="display:flex;align-items:center;gap:4px"><div style="width:10px;height:10px;border-radius:2px;background:'+CAT_COLORS[k]+'"></div><span style="font-size:.75rem;color:var(--navy)">'+(CAT_LABELS[k]||k)+'</span></div>';
  });
  h += '</div></div>';

  return h;
}

// TAB 10: NEIGHBORHOOD (Workshop Exercise)

function renderLabModule() {
  var CELL_SF = 121; // 11' x 11'
  var BUDGET = S.labBudget;

  // Fixed width: 88' = 8 bays x 11'. Depth grows with budget.
  var COLS = 8;
  var widthFt = COLS * 11; // 88'
  var ROWS = Math.max(1, Math.ceil(BUDGET / (COLS * CELL_SF)));
  var totalCells = COLS * ROWS;
  var depthFt = ROWS * 11;
  var gridSF = totalCells * CELL_SF;

  var h = '<div class="note-bl">Workshop Exercise: What is the minimum viable lab neighborhood? Adjust the total area, add PI groups, and watch the Engineering Loft fill up. Space includes Lab, Lab Support &amp; Write-Up (exclusive of faculty offices). Each grid cell = one 11\u2032 \u00d7 11\u2032 structural bay (121 SF). Width is fixed at 88\u2032 (8 bays); depth grows with area.</div>';

  // Neighborhood size slider
  h += '<div class="card"><div class="card-title">Neighborhood Size</div>';
  h += '<div class="card-sub">Set the total lab neighborhood area. The loft depth scales to match while width stays at 88\u2032.</div>';
  h += '<label class="sl">Neighborhood Area</label>';
  h += '<div class="sl-row"><input type="range" min="2000" max="25000" step="500" value="'+BUDGET+'" oninput="setLabBudget(this.value)"><div class="sl-val">'+F(BUDGET)+' SF</div></div>';
  h += '<div style="display:flex;gap:16px;margin-top:4px;font-size:.85rem;color:var(--mut)">';
  h += '<span>'+widthFt+'\u2032 wide \u00d7 '+depthFt+'\u2032 deep ('+COLS+' \u00d7 '+ROWS+' bays)</span>';
  h += '<span>Grid = '+F(gridSF)+' SF</span>';
  h += '</div></div>';

  // Calculate totals
  var usedSF = 0;
  S.labModule.forEach(function(g) { usedSF += g.groupSize * (g.labSF + g.deskSF) * g.qty; });
  var remaining = BUDGET - usedSF;

  // Budget bar
  var cls = remaining >= 0 ? 'under' : 'over';
  h += '<div class="card"><div class="card-title">'+F(BUDGET)+' SF Budget</div>';
  h += '<div style="display:flex;justify-content:space-between;margin-bottom:6px">';
  h += '<span style="font-size:1.1rem;font-weight:700">Used: '+F(usedSF)+' SF</span>';
  h += '<span class="'+cls+'" style="font-size:1.1rem;font-weight:700">'+(remaining>=0?'+':'')+F(remaining)+' SF '+(remaining>=0?'remaining':'over budget')+'</span></div>';
  var barLabSF = 0, barDeskSF = 0;
  S.labModule.forEach(function(g) {
    barLabSF += g.groupSize * g.labSF * g.qty;
    barDeskSF += g.groupSize * g.deskSF * g.qty;
  });
  h += '<div class="bar-budget" style="height:38px;font-family:\'IBM Plex Mono\',monospace">';
  var labPctW = BUDGET > 0 ? (barLabSF / BUDGET * 100) : 0;
  var deskPctW = BUDGET > 0 ? (barDeskSF / BUDGET * 100) : 0;
  var labPctRound = BUDGET > 0 ? Math.round(barLabSF / BUDGET * 100) : 0;
  var deskPctRound = BUDGET > 0 ? Math.round(barDeskSF / BUDGET * 100) : 0;
  if (labPctW > 0) h += '<div style="width:'+Math.min(labPctW,100).toFixed(1)+'%;background:'+FICM.resA+';display:flex;align-items:center;justify-content:center;overflow:hidden" title="Lab: '+F(barLabSF)+' SF"><span style="font-size:.7rem;font-weight:700;color:#fff;white-space:nowrap">Lab '+F(barLabSF)+' SF ('+labPctRound+'%)</span></div>';
  if (deskPctW > 0) h += '<div style="width:'+Math.min(deskPctW,100-labPctW).toFixed(1)+'%;background:'+FICM.officeA+';display:flex;align-items:center;justify-content:center;overflow:hidden" title="Desk: '+F(barDeskSF)+' SF"><span style="font-size:.7rem;font-weight:700;color:#fff;white-space:nowrap">Desk '+F(barDeskSF)+' SF ('+deskPctRound+'%)</span></div>';
  h += '</div></div>';

  h += '<div class="g2">';

  // LEFT: PI Group Controls
  h += '<div>';
  S.labModule.forEach(function(g, i) {
    var sfPerFTE = g.labSF + g.deskSF;
    var groupLabTotal = g.groupSize * g.labSF;
    var groupDeskTotal = g.groupSize * g.deskSF;
    var groupSF = groupLabTotal + groupDeskTotal;
    var totalSF = groupSF * g.qty;

    h += '<div class="typ-card" style="border-color:var(--navy);border-width:1.5px;margin-bottom:10px">';
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
    h += '<h4 style="background:var(--navy);flex:1;margin:0;font-size:.95rem"><input type="text" value="'+g.label.replace(/"/g,'&quot;')+'" style="background:transparent;border:none;color:#fff;font-size:.95rem;font-weight:900;font-family:inherit;width:100%;outline:none" onchange="renameLM('+i+',this.value)"></h4>';
    h += '<button class="btn btn-out btn-sm" style="color:var(--coral);border-color:var(--coral)" onclick="deleteLM('+i+')">\u2715</button>';
    h += '</div>';

    h += '<label class="sl" style="color:var(--dGreen)">Quantity of PIs</label>';
    h += '<div class="sl-row"><input type="range" min="1" max="10" step="1" value="'+g.qty+'" style="accent-color:var(--dGreen)" oninput="setLM('+i+',\'qty\',this.value)"><div class="sl-val" style="color:var(--dGreen)">'+g.qty+' PI'+(g.qty>1?'s':'')+'</div></div>';

    h += '<label class="sl">Group Size: PI + '+g.groupSize+' FTEs</label>';
    h += '<div class="sl-row"><input type="range" min="1" max="25" step="1" value="'+g.groupSize+'" oninput="setLM('+i+',\'groupSize\',this.value)"><div class="sl-val">PI+'+g.groupSize+'</div></div>';

    h += '<label class="sl" style="color:'+FICM.resA+'">Lab SF per FTE</label>';
    h += '<div class="sl-row"><input type="range" min="0" max="250" step="5" value="'+g.labSF+'" style="accent-color:'+FICM.resA+'" oninput="setLM('+i+',\'labSF\',this.value)"><div class="sl-val" style="color:'+FICM.resA+'">'+g.labSF+' SF</div></div>';

    h += '<label class="sl" style="color:'+FICM.officeA+'">Desk SF per FTE</label>';
    h += '<div class="sl-row"><input type="range" min="30" max="250" step="5" value="'+g.deskSF+'" style="accent-color:'+FICM.officeA+'" oninput="setLM('+i+',\'deskSF\',this.value)"><div class="sl-val" style="color:'+FICM.officeA+'">'+g.deskSF+' SF</div></div>';

    h += '<div style="margin-top:8px;padding-top:8px;border-top:2px solid var(--bdr)">';
    h += '<div style="display:flex;gap:4px;margin-bottom:8px">';
    if (groupLabTotal > 0) h += '<div style="flex:'+groupLabTotal+';height:10px;background:'+FICM.resA+';border-radius:4px 0 0 4px"></div>';
    h += '<div style="flex:'+groupDeskTotal+';height:10px;background:'+FICM.officeA+';border-radius:'+(groupLabTotal>0?'0 4px 4px 0':'4px')+'"></div>';
    h += '</div>';
    h += '<div class="typ-row"><span class="tk" style="color:'+FICM.resA+'">Lab ('+g.groupSize+' \u00d7 '+g.labSF+')</span><span class="tv" style="color:'+FICM.resA+'">'+F(groupLabTotal)+' SF</span></div>';
    h += '<div class="typ-row"><span class="tk" style="color:'+FICM.officeA+'">Desk ('+g.groupSize+' \u00d7 '+g.deskSF+')</span><span class="tv" style="color:'+FICM.officeA+'">'+F(groupDeskTotal)+' SF</span></div>';
    h += '<div class="typ-row"><span class="tk">Per Group ('+sfPerFTE+' SF/FTE)</span><span class="tv">'+F(groupSF)+' SF</span></div>';
    h += '<div class="typ-row"><span class="tk">Total ('+g.qty+' PI'+(g.qty>1?'s':'')+')</span><span class="tv" style="font-weight:900">'+F(totalSF)+' SF</span></div>';
    h += '</div></div>';
  });

  h += '<button class="btn btn-navy" style="margin-top:8px" onclick="addLM()">+ Add PI Group</button>';
  h += '</div>';

  // RIGHT: Grid Visual
  h += '<div>';
  h += '<div class="card"><div class="card-title">Engineering Loft</div>';
  h += '<div class="card-sub">'+COLS+' \u00d7 '+ROWS+' structural bays @ 11\u2032 = '+widthFt+'\u2032 wide \u00d7 '+depthFt+'\u2032 deep = '+F(gridSF)+' SF</div>';

  // Build cell assignments — desk cells grouped at top of loft, lab below
  var deskCells = [], labCellsArr = [];
  var totalLabSF = 0, totalDeskSF = 0;
  S.labModule.forEach(function(g) {
    var groupLab = g.groupSize * g.labSF;
    var groupDesk = g.groupSize * g.deskSF;
    var nLab = Math.round(groupLab / CELL_SF);
    var nDesk = Math.round(groupDesk / CELL_SF);
    for (var p = 0; p < g.qty; p++) {
      for (var c = 0; c < nDesk; c++) {
        deskCells.push({ color:FICM.officeA, label:g.label+' \u2014 Desk', piNum:p+1, isFirst:c===0, type:'desk' });
      }
      for (var c = 0; c < nLab; c++) {
        labCellsArr.push({ color:FICM.resA, label:g.label+' \u2014 Lab', piNum:p+1, isFirst:c===0, type:'lab' });
      }
      totalLabSF += groupLab;
      totalDeskSF += groupDesk;
    }
  });
  // Desk on top, lab below
  var cells = deskCells.concat(labCellsArr);

  var overflow = cells.length > totalCells;

  h += '<div style="max-width:440px;margin:8px auto">';
  h += '<div style="text-align:center;font-family:\'IBM Plex Mono\',monospace;font-size:.72rem;font-weight:600;color:var(--navy);margin-bottom:4px">\u2190 '+widthFt+'\u2032 ('+COLS+' bays \u00d7 11\u2032) \u2192</div>';
  h += '<div style="display:flex;gap:6px">';

  // Vertical label
  h += '<div style="writing-mode:vertical-lr;transform:rotate(180deg);text-align:center;font-family:\'IBM Plex Mono\',monospace;font-size:.72rem;font-weight:600;color:var(--navy);display:flex;align-items:center;justify-content:center">\u2190 '+depthFt+'\u2032 \u2192</div>';

  // Grid — fixed 8 columns, rows grow with budget
  h += '<div style="flex:1;display:grid;grid-template-columns:repeat('+COLS+',1fr);gap:2px;border:3px solid '+(overflow?'var(--coral)':'var(--navy)')+';border-radius:6px;padding:3px;background:'+(overflow?'var(--coral)':'var(--navy)')+'">';

  for (var c = 0; c < totalCells; c++) {
    var cell = cells[c];
    if (cell) {
      var inner = '';
      if (cell.isFirst) inner = '<span style="font-size:.55rem;font-weight:900;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.4);pointer-events:none">PI</span>';
      h += '<div style="background:'+cell.color+';border-radius:3px;display:flex;align-items:center;justify-content:center;aspect-ratio:1" title="'+cell.label+' (PI #'+cell.piNum+')">'+inner+'</div>';
    } else {
      h += '<div style="background:#f0f0f0;border-radius:3px;aspect-ratio:1"></div>';
    }
  }
  h += '</div></div>';

  // Overflow warning
  if (overflow) {
    var overCells = cells.length - totalCells;
    h += '<div style="text-align:center;margin-top:6px;font-size:.85rem;font-weight:700;color:var(--coral)">\u26a0 '+overCells+' bay'+(overCells>1?'s':'')+' over capacity ('+F(overCells*CELL_SF)+' SF overflow)</div>';
  }
  h += '</div>';

  // Legend
  var labCellCount = cells.filter(function(c){return c.type==='lab'}).length;
  var deskCellCount = cells.filter(function(c){return c.type==='desk'}).length;
  var availCells = Math.max(0, totalCells - cells.length);
  h += '<div class="legend" style="justify-content:center;margin-top:10px">';
  h += '<div class="legend-item"><div class="legend-dot" style="background:'+FICM.resA+'"></div>Lab ('+labCellCount+' bays / '+F(totalLabSF)+' SF)</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:'+FICM.officeA+'"></div>Write-Up / Desk ('+deskCellCount+' bays / '+F(totalDeskSF)+' SF)</div>';
  if (availCells > 0) h += '<div class="legend-item"><div class="legend-dot" style="background:#f0f0f0;border:1px solid #ccc"></div>Available ('+availCells+' bays)</div>';
  h += '</div>';

  h += '</div></div>';

  h += '</div>'; // close g2

  // Summary table
  h += '<div class="card" style="margin-top:12px"><div class="card-title">Population Summary</div>';
  h += '<table class="comp"><tr><th>PI Group</th><th>Size</th><th style="color:'+FICM.resA+'">Lab/FTE</th><th style="color:'+FICM.officeA+'">Desk/FTE</th><th>SF/FTE</th><th style="color:'+FICM.resA+'">Lab SF</th><th style="color:'+FICM.officeA+'">Desk SF</th><th># PIs</th><th>Total SF</th></tr>';
  var totalPeople = 0, tblLabSF = 0, tblDeskSF = 0;
  S.labModule.forEach(function(g) {
    var sfPerFTE = g.labSF + g.deskSF;
    var groupSF = g.groupSize * sfPerFTE;
    var totalSF = groupSF * g.qty;
    var gLab = g.groupSize * g.labSF * g.qty;
    var gDesk = g.groupSize * g.deskSF * g.qty;
    totalPeople += (1 + g.groupSize) * g.qty;
    tblLabSF += gLab;
    tblDeskSF += gDesk;
    h += '<tr><td style="font-weight:700">'+g.label+'</td>';
    h += '<td>PI+'+g.groupSize+'</td><td style="color:'+FICM.resA+'">'+g.labSF+'</td><td style="color:'+FICM.officeA+'">'+g.deskSF+'</td><td>'+sfPerFTE+'</td>';
    h += '<td style="color:'+FICM.resA+';font-weight:700">'+F(gLab)+'</td>';
    h += '<td style="color:'+FICM.officeA+';font-weight:700">'+F(gDesk)+'</td>';
    h += '<td>'+g.qty+'</td><td style="font-weight:700">'+F(totalSF)+'</td></tr>';
  });
  var totalPIs = S.labModule.reduce(function(s,g){return s+g.qty},0);
  h += '<tr style="background:var(--navy)"><td style="color:#fff;font-weight:700" colspan="4">TOTAL</td>';
  h += '<td style="color:#fff;font-weight:700"></td>';
  h += '<td style="color:'+FICM.resA+';font-weight:700;background:rgba(255,255,255,.1)">'+F(tblLabSF)+'</td>';
  h += '<td style="color:'+FICM.officeA+';font-weight:700;background:rgba(255,255,255,.1)">'+F(tblDeskSF)+'</td>';
  h += '<td style="color:#fff;font-weight:700">'+totalPIs+'</td>';
  h += '<td style="color:#fff;font-weight:700">'+F(usedSF)+'</td></tr>';
  h += '</table>';

  var sfPerson = totalPeople > 0 ? Math.round(BUDGET / totalPeople) : 0;
  h += '<div style="margin-top:10px;padding:10px;background:var(--lTeal);border-radius:8px;font-size:.92rem;color:var(--navy);font-weight:500">';
  h += '<strong>'+totalPeople+' people</strong> ('+totalPIs+' PIs + '+(totalPeople-totalPIs)+' FTEs) in '+F(BUDGET)+' SF = <strong>'+sfPerson+' SF/person</strong></div>';
  h += '</div>';

  return h;
}

    { label:'Cost / GSF (Project)', key:function(sc){return sc.data.cost?FM(Math.round(sc.data.cost.costPerGSF)):'\u2014'} },
  ];
  S.types.forEach(function(t){
    rows.push({ label:t.label+' PIs', key:function(sc){
      var st = sc.state.types.find(function(x){return x.id===t.id});
      return st ? st.pis : 0;

  rows.forEach(function(r){
    h += '<tr><td style="font-weight:'+(r.bold?'900':'600')+'">'+r.label+'</td>';
    S.scenarios.forEach(function(sc, si){

  h += '</div>';

  return h;
}

function saveScenario() {
  var nameEl = document.getElementById('scName');
  var name = nameEl ? nameEl.value.trim() : '';
  if (!name) name = 'Scenario ' + (S.scenarios.length + 1);
  var d = C();
  S.scenarios.push({ name:name, state:JSON.parse(JSON.stringify(S)), data:JSON.parse(JSON.stringify(d)) });
  S.activeScenario = S.scenarios.length - 1;
  render();
}
function selectScenario(i) { S.activeScenario = i; render(); }
function loadScenario(i) {
  var sc = S.scenarios[i];
  var saved = S.scenarios, active = i;
  Object.keys(sc.state).forEach(function(k) {
    if (k !== 'scenarios' && k !== 'activeScenario') S[k] = JSON.parse(JSON.stringify(sc.state[k]));
  });
  S.scenarios = saved; S.activeScenario = active; render();
}
function deleteScenario(i) {
  S.scenarios.splice(i, 1);
  if (S.activeScenario >= S.scenarios.length) S.activeScenario = S.scenarios.length - 1;
  render();
}
function clearScenarios() { S.scenarios = []; S.activeScenario = -1; render(); }

// Approximate population splits by typology (% of FTE that are postdocs, grads, staff)
var POP_SPLITS = {
  wetbio:   { postdoc:0.25, grad:0.60, staff:0.15 },
  wetchem:  { postdoc:0.25, grad:0.55, staff:0.20 },
  dryelec:  { postdoc:0.15, grad:0.70, staff:0.15 },
  comp:     { postdoc:0.10, grad:0.80, staff:0.10 },
  optics:   { postdoc:0.20, grad:0.55, staff:0.25 },
  optnano:  { postdoc:0.20, grad:0.55, staff:0.25 },
  custom_1775851246404: { postdoc:0.25, grad:0.55, staff:0.20 }
};

function calcPopulation(sc) {
  var pis = 0, postdocs = 0, grads = 0, staff = 0;
  sc.state.types.forEach(function(t) {
    if (t.pis <= 0) return;
    pis += t.pis;
    var totalFTE = t.pis * t.fteCount;
    var split;
    if (t.id === 'custom_1775851246404') {
      // Weighted population split from constituent types
      split = { postdoc:0, grad:0, staff:0 };
      Object.keys(sc.state.largeMix || S.largeMix).forEach(function(k) {
        var w = (sc.state.largeMix || S.largeMix)[k];
        var s = POP_SPLITS[k] || { postdoc:0.20, grad:0.60, staff:0.20 };
        split.postdoc += w * s.postdoc;
        split.grad += w * s.grad;
        split.staff += w * s.staff;
      });
    } else {
      split = POP_SPLITS[t.id] || { postdoc:0.20, grad:0.60, staff:0.20 };
    }
    postdocs += Math.round(totalFTE * split.postdoc);
    grads += Math.round(totalFTE * split.grad);
    staff += Math.round(totalFTE * split.staff);
  });
  return { pis:pis, postdocs:postdocs, grads:grads, staff:staff, total:pis+postdocs+grads+staff };
}

// For each scenario, compute office and desk counts at baseline
// group size and at floor of PI+4 / ceiling of PI+2 above baseline.
function renderOccupancySensitivity(pops) {
  if (S.scenarios.length === 0) return '';
  var h = '<div class="card"><div class="card-title">Occupancy Sensitivity — Offices vs. Desks</div>';
  h += '<div class="card-sub">Faculty offices are fixed per PI count; desks scale with group size. Low band assumes PI+4 minimum; high band adds +2 FTE above baseline.</div>';

  var rows = S.scenarios.map(function(sc, si) {
    var offices = 0, desks = 0, desksLo = 0, desksHi = 0;
    var flexCount = 0;
    sc.state.types.forEach(function(t) {
      if (t.pis <= 0) return;
      offices += t.pis;
      if (t.flexOffice > 0) flexCount += t.pis;
      var baseFTE = t.pis * t.fteCount;
      var loFTE = t.pis * Math.max(4, t.fteCount - 2); // floor at PI+4
      var hiFTE = t.pis * (t.fteCount + 2);
      desks += baseFTE;
      desksLo += loFTE;
      desksHi += hiFTE;
    });
    return {
      name: sc.name,
      offices: offices,
      flex: flexCount,
      desks: desks,
      desksLo: desksLo,
      desksHi: desksHi,
      totalSeats: offices + desks,
      totalSeatsLo: offices + desksLo,
      totalSeatsHi: offices + desksHi,
      pop: pops[si]
    };
  });

  // Table
  h += '<div style="overflow-x:auto"><table class="comp">';
  h += '<tr><th style="min-width:220px">Occupancy Metric</th>';
  S.scenarios.forEach(function(sc, i) {
    var thBorder = i === S.activeScenario ? 'box-shadow:inset 0 -3px 0 #fff;' : '';
    h += '<th style="min-width:140px;cursor:pointer;'+thBorder+'" onclick="selectScenario('+i+')">'+sc.name+'</th>';
  });
  h += '</tr>';

  // Row helper
  function addRow(label, getter, bold, color, border) {
    h += '<tr'+(border?' style="border-top:'+border+'"':'')+'>';
    h += '<td style="font-weight:'+(bold?'900':'600')+'">'+label+'</td>';
    rows.forEach(function(r, i) {
