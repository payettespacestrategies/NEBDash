<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEB Programming Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#1B3A5C;--blue:#2E75B6;--teal:#66C6C1;--mTeal:#9EDDD1;--lTeal:#CAEADF;--yel:#FFE885;--lYel:#FFF4C7;--gold:#FEB522;--peri:#98ACE5;--lBl:#B6CDEF;--coral:#F28D79;--pink:#EFB1D0;--gray:#C2C3C8;--dk:#404040;--bg:#F7F6F3;--card:#FFF;--bdr:#E2DED8;--mut:#888780;--r:12px;--green:#5BAD5E;--dGreen:#2A8C3C;
--clrResearch:#F2AA9C;--clrCommunity:#FFDF5A;--clrCore:#E086C0;--clrEvent:#66C6C1;--clrSupport:#C2C3C8;
--magenta:#E068B5;--salmon:#F2AA9C;--ltCoral:#F9D9C7;--ltPink:#FCDEDE;--ltTeal:#E9FFF7;--ltBlue:#C5E1FF;--ltYellow:#FFF4C7;--ltGold:#FFFBEB}
body{font-family:'Sora',sans-serif;font-weight:300;background:var(--bg);color:var(--dk);padding:0;margin:0}
.w{width:100%;max-width:1440px;margin:0 auto;padding:1.2rem 2rem;overflow-y:auto;display:flex;flex-direction:column}
.logo-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 8px 6px}
.logo-bar img{height:36px;object-fit:contain}
.logo-bar svg{height:auto}
.hd{text-align:center;margin-bottom:.8rem}
.hd h1{font-size:2rem;font-weight:900;color:var(--navy);letter-spacing:-.5px}
.hd-sub{font-size:.82rem;color:var(--mut);font-weight:400}
.tabs{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap}
.tab{padding:.6rem 1.4rem;border-radius:24px;border:2px solid var(--bdr);background:#fff;font-size:1rem;cursor:pointer;color:var(--mut);font-weight:600;font-family:inherit;transition:all .2s}
.tab.on{background:var(--navy);color:#fff;border-color:var(--navy);transform:scale(1.02)}
.tab:hover:not(.on){background:#eee;border-color:#ccc}
.ms{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:.6rem;margin-bottom:1rem}
.m{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r);padding:.8rem 1rem;text-align:center;transition:border-color .2s}
.m:hover{border-color:var(--blue)}
.mv{font-family:'IBM Plex Mono',monospace;font-size:2.2rem;font-weight:700;color:var(--navy)}
.ml{font-size:.72rem;color:var(--mut);margin-top:2px;font-weight:400}
.card{background:#fff;border:1.5px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:12px}
.card-title{font-size:1.5rem;font-weight:900;color:var(--navy);margin-bottom:10px}
.card-sub{font-size:.82rem;color:var(--mut);margin-bottom:8px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
label.sl{display:block;font-size:1rem;font-weight:600;color:var(--navy);margin-bottom:4px}
.sl-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sl-row input[type=range]{flex:1;accent-color:var(--navy);height:6px}
.sl-val{font-family:'IBM Plex Mono',monospace;font-size:1.4rem;font-weight:700;color:var(--navy);min-width:90px;text-align:right}
input[type=number]{width:80px;border:1.5px solid var(--bdr);border-radius:6px;padding:6px 8px;font-family:'IBM Plex Mono',monospace;font-size:1rem;font-weight:600;text-align:right;color:var(--navy)}
input[type=number]:focus{outline:2px solid var(--blue);border-color:var(--blue)}
input[type=text]:focus,textarea:focus{outline:2px solid var(--blue);border-color:var(--blue)}
select{border:1.5px solid var(--bdr);border-radius:6px;padding:6px 8px;font-family:'Sora',sans-serif;font-size:.85rem;font-weight:500;color:var(--navy)}
.btn{padding:8px 20px;border-radius:20px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-navy{background:var(--navy);color:#fff}.btn-navy:hover{background:#2a5a8c}
.btn-teal{background:var(--teal);color:#fff}.btn-teal:hover{background:#55b5b0}
.btn-coral{background:var(--coral);color:#fff}.btn-coral:hover{background:#e07060}
.btn-out{background:#fff;color:var(--navy);border:2px solid var(--bdr)}.btn-out:hover{background:#f0f0f0}
.btn-sm{padding:4px 12px;font-size:.75rem;border-radius:14px}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.7rem;font-weight:700}
.note{background:var(--lYel);border:1.5px solid #e8d88a;border-radius:var(--r);padding:12px 16px;font-size:.95rem;margin-bottom:12px;color:#6b5b00}
.note-bl{background:#E3F2FD;border:1.5px solid #90CAF9;border-radius:var(--r);padding:12px 16px;font-size:.95rem;margin-bottom:12px;color:#1565C0}
.bar-budget{height:28px;border-radius:6px;overflow:hidden;display:flex;position:relative;background:#eee}
.bar-budget div{height:100%;transition:width .4s ease}
.over{color:var(--coral);font-weight:700}
.under{color:var(--green);font-weight:700}
.typ-card{border:2.5px solid var(--bdr);border-radius:var(--r);padding:14px;background:#fff;transition:all .2s}
.typ-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
.typ-card h4{font-size:1.15rem;font-weight:900;color:#fff;padding:8px 16px;border-radius:8px;display:inline-block;margin-bottom:10px}
.typ-row{display:flex;justify-content:space-between;font-size:.95rem;padding:5px 0;border-bottom:1px solid #f0f0f0}
.typ-row:last-child{border:none}
.typ-row .tk{color:var(--mut);font-weight:400}
.typ-row .tv{font-family:'IBM Plex Mono',monospace;font-weight:700;color:var(--navy)}
.scenario-card{border:2px solid var(--bdr);border-radius:var(--r);padding:14px;background:#fff;cursor:pointer;transition:all .2s}
.scenario-card.active{border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,58,92,.15)}
.scenario-card:hover{border-color:var(--blue)}
.sc-name{font-size:1.2rem;font-weight:900;color:var(--navy)}
.sc-gsf{font-family:'IBM Plex Mono',monospace;font-size:1.6rem;font-weight:700;color:var(--navy)}
.hidden{display:none!important}
.floor-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.floor-label{font-size:1rem;font-weight:700;color:var(--navy);min-width:130px;text-align:right}
.floor-bar{flex:1;height:44px;border-radius:8px;overflow:hidden;display:flex;position:relative;background:#f0f0f0;cursor:pointer}
.floor-bar div{height:100%;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;color:#fff;overflow:hidden;transition:width .4s}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:10px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:.82rem;font-weight:500}
.legend-dot{width:14px;height:14px;border-radius:4px}
table.comp{width:100%;border-collapse:collapse;font-size:.92rem}
table.comp th{background:var(--navy);color:#fff;padding:10px 12px;font-weight:700;text-align:left;font-size:.95rem}
table.comp td{padding:9px 12px;border-bottom:1.5px solid var(--bdr);font-family:'IBM Plex Mono',monospace;font-weight:500;font-size:.92rem}
table.comp tr:hover{background:#f8f8f5}
.derived{background:var(--lTeal);border:2px solid var(--teal);border-radius:var(--r);padding:14px;margin-bottom:12px}
.derived-label{font-size:.82rem;color:var(--mut);font-weight:500}
.derived-val{font-family:'IBM Plex Mono',monospace;font-size:2rem;font-weight:700;color:var(--navy)}
@media print{body{padding:0;background:#fff}.hd,.tabs,.btn{display:none!important}}
footer{margin-top:1.5rem;font-size:.7rem;color:var(--mut);font-family:'IBM Plex Mono',monospace;display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--bdr)}
footer .ft-left{display:flex;align-items:center;gap:6px}
footer .ft-left .btn{font-size:.6rem;padding:3px 8px;min-width:0}
footer .ft-right{display:flex;align-items:center;gap:12px}
.login-overlay{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}
.login-box{background:#fff;border:1.5px solid var(--bdr);border-radius:16px;padding:48px 40px 40px;width:380px;max-width:90vw;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.08)}
.login-box h2{font-family:'Sora',sans-serif;font-size:1.3rem;font-weight:700;color:var(--navy);margin:16px 0 4px}
.login-box .sub{font-size:.82rem;color:var(--mut);margin-bottom:24px}
.login-box input{display:block;width:100%;padding:10px 14px;margin-bottom:12px;border:1.5px solid var(--bdr);border-radius:8px;font-family:'Sora',sans-serif;font-size:.92rem;outline:none;transition:border-color .2s}
.login-box input:focus{border-color:var(--navy)}
.login-box button{width:100%;padding:11px;border:none;border-radius:8px;background:var(--navy);color:#fff;font-family:'Sora',sans-serif;font-size:.95rem;font-weight:600;cursor:pointer;transition:background .2s}
.login-box button:hover{background:#14304d}
.login-err{color:#E53935;font-size:.82rem;margin-top:8px;min-height:1.2em}
</style></head><body>
<div id="loginOverlay" class="login-overlay">
  <div class="login-box">
    <svg viewBox="0 0 416 48" width="240" height="28" xmlns="http://www.w3.org/2000/svg" style="margin:0 auto">
      <text x="0" y="36" font-family="Georgia,'Times New Roman',serif" font-size="32" font-weight="400" fill="#4E2A84">Northwestern</text>
      <line x1="212" y1="6" x2="212" y2="42" stroke="#4E2A84" stroke-width="1.5"/>
      <text x="220" y="20" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="400" letter-spacing="1.8" fill="#342F2E">McCORMICK SCHOOL OF</text>
      <text x="220" y="40" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700" letter-spacing="1.2" fill="#342F2E">ENGINEERING</text>
    </svg>
    <h2>NEB Programming Dashboard</h2>
    <div class="sub" style="margin-bottom:24px"></div>
    <input id="loginUser" type="text" placeholder="Login" autocomplete="off" onkeydown="if(event.key==='Enter')doLogin()">
    <input id="loginPass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Sign In</button>
    <div id="loginErr" class="login-err"></div>
  </div>
</div>
<div class="w" id="dashWrap" style="display:none">
<div class="logo-bar">
<svg viewBox="0 0 416 48" width="280" height="32" xmlns="http://www.w3.org/2000/svg">
  <text x="0" y="36" font-family="Georgia,'Times New Roman',serif" font-size="32" font-weight="400" fill="#4E2A84">Northwestern</text>
  <line x1="212" y1="6" x2="212" y2="42" stroke="#4E2A84" stroke-width="1.5"/>
  <text x="220" y="20" font-family="Arial,Helvetica,sans-serif" font-size="10" font-weight="400" letter-spacing="1.8" fill="#342F2E">McCORMICK SCHOOL OF</text>
  <text x="220" y="40" font-family="Arial,Helvetica,sans-serif" font-size="22" font-weight="700" letter-spacing="1.2" fill="#342F2E">ENGINEERING</text>
</svg>
<svg viewBox="0 0 200 48" width="150" height="36" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="0" width="200" height="48" rx="0" fill="none" stroke="#000" stroke-width="11"/>
  <text x="98" y="33" text-anchor="middle" font-family="'Arial Black',Arial,Helvetica,sans-serif" font-size="21" font-weight="900" letter-spacing="4" fill="#000">PAYETTE</text>
</svg>
</div>
<div class="hd">
<h1>NEB Programming Dashboard</h1>
</div>
<div class="tabs" id="tabBar"></div>
<div class="ms" id="metrics"></div>
<div id="content"></div>
<footer><div class="ft-left"><button class="btn btn-navy" onclick="exportJSON()">Export JSON</button><button class="btn btn-out" onclick="document.getElementById('importJsonInput').click()">Import JSON</button><input type="file" id="importJsonInput" accept=".json,application/json" style="display:none" onchange="importJSON(event)"><button class="btn btn-navy" onclick="exportXLSX()">Export Excel</button><button class="btn btn-out" onclick="window.print()">Print</button></div><div class="ft-right"><span id="ts"></span></div></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/d3-sankey@0.12.3/dist/d3-sankey.min.js"></script>
<script>
// ============================================================
// LOGIN
// ============================================================
function doLogin() {
  var u = document.getElementById('loginUser').value.trim();
  var p = document.getElementById('loginPass').value;
  if (u === 'McCormick' && p === 'B3lieve!') {
    document.getElementById('loginOverlay').style.display = 'none';
    document.getElementById('dashWrap').style.display = '';
  } else {
    document.getElementById('loginErr').textContent = 'Invalid login or password.';
    document.getElementById('loginPass').value = '';
    document.getElementById('loginPass').focus();
  }
}

// ============================================================
// FICM COLOR PALETTE (Payette Taxonomy)
// ============================================================
var FICM = {
  office:    '#B6CDEF', officeA:'#98ACE5', officeB:'#B6CDEF', officeC:'#C5E1FF', officeD:'#E6F7FF',
  learning:  '#9EDDD1', learnA:'#66C6C1', learnB:'#9EDDD1', learnC:'#CAEADF', learnD:'#E9FFF7',
  circ:      '#FFFBEB', circA:'#FEB522', circB:'#FFDF5A', circC:'#FFFBEB',
  community: '#FFF4C7', commA:'#FFE885', commB:'#FFF4C7',
  research:  '#F2AA9C', resA:'#F28D79', resB:'#F2AA9C', resC:'#F9D9C7', resD:'#FFEED4',
  specialty: '#E086C0', specA:'#E068B5', specB:'#E086C0', specC:'#EFB1D0', specD:'#FCDEDE',
  support:   '#C2C3C8', supportA:'#C2C3C8', supportB:'#E7E7E7'
};

// 6 typology card colors drawn from FICM detail palette
var TYPE_COLORS = [
  FICM.resA,     // Wet Labs (BioE) - coral
  FICM.resB,     // Wet Chem/Materials - salmon
  FICM.learnA,   // Dry Lab Workshop - teal
  FICM.officeA,  // Computational - periwinkle
  FICM.circA,    // Quantum / Optics - gold
  FICM.specA,    // Clean Room / Fab - magenta
];

// ============================================================
// GLOBAL STATE
// ============================================================
var S = {
  // Tab 1 - Project Size (floor plates drive GSF)
  basementGSF: 35500,
  aboveGradeGSF: 35000,
  penthouseGSF: 24500,
  aboveGradeFloors: 4,
  basementEff: 0.50,
  aboveGradeEff: 0.70,
  groundFloorEff: 0.55,
  penthouseEff: 0.0,

  // Tab 2 - PI Typologies (Open Lab + Lab Support + Write-Up Desk + Offices)
  types: [
    { id:'wetbio',  label:'Wet Labs (BioE)',             color:TYPE_COLORS[0], fteCount:8, openLabPerFTE:70,  labSupportPerFTE:70,  deskPerFTE:45, facultyOffice:135, flexOffice:30, infra:'BSL-2, fume hoods, DI water, autoclaves, standby for -80s', pis:0 },
    { id:'wetchem', label:'Wet Chem/Materials',           color:TYPE_COLORS[1], fteCount:8, openLabPerFTE:120, labSupportPerFTE:60,  deskPerFTE:45, facultyOffice:135, flexOffice:30, infra:'Fume hood intensive', pis:0 },
    { id:'dryelec', label:'Dry Lab Workshop',             color:TYPE_COLORS[2], fteCount:8, openLabPerFTE:70,  labSupportPerFTE:50,  deskPerFTE:45, facultyOffice:135, flexOffice:30, infra:'Std power, butcher block tops, soldering, can be rough & ready', pis:0 },
    { id:'comp',    label:'Computational',                color:TYPE_COLORS[3], fteCount:8, openLabPerFTE:0,   labSupportPerFTE:0,   deskPerFTE:60, facultyOffice:135, flexOffice:30, infra:'Office settings, quiet & collab workspaces', pis:0 },
    { id:'optics',  label:'Optics Lower Intensity',       color:TYPE_COLORS[4], fteCount:8, openLabPerFTE:160, labSupportPerFTE:30,  deskPerFTE:45, facultyOffice:135, flexOffice:30, infra:'Vibration Class A-B, laser safety, blackout, optical tables', pis:0 },
    { id:'optnano', label:'Optics Nano Higher Intensity',  color:TYPE_COLORS[5], fteCount:8, openLabPerFTE:180, labSupportPerFTE:40,  deskPerFTE:85, facultyOffice:135, flexOffice:30, infra:'Vibration isolation, laser safety, chemical and flammable use', pis:0 },
    { id:'custom_1775851246404', label:'Large Lab',       color:TYPE_COLORS[0], fteCount:25, openLabPerFTE:70, labSupportPerFTE:70, deskPerFTE:45, facultyOffice:135, flexOffice:30, infra:'Large group sizes', pis:0 },
  ],

  // Tab 3 - Building Mix
  totalPIs: 30,

  // Tab 4 - Core
  corePct: 0.22,
  coreFloorSplit: { basement:1.0, ground:0.0, research:0.0 }, // % of core NASF per zone
  coreItems: [
    { name:'Advanced Imaging / Characterization', nasf:6000, on:true },
    { name:'Shared Instrumentation / Fabrication',       nasf:6000, on:true },
    { name:'Flex Lab',                            nasf:4000, on:true },
    { name:'Robotics / Flight Test',              nasf:2000, on:false },
    { name:'Battery / Energy Testing',            nasf:3000, on:true },
    { name:'Structural / Materials Testing',      nasf:2000, on:false },
    { name:'Simulation / Visualization',          nasf:1200, on:false },
    { name:'Anechoic / Environmental Chamber',    nasf:1000, on:false },
  ],

  // Tab 5 - Community (two categories: Ground Floor + Upper Floor)
  communityPct: 0.13,
  gfProgram: [
    { name:'Eng Commons',                nasf:6000, on:true, cat:'community' },
    { name:'Colloquium / Flex, 200p',    nasf:5000, on:true, cat:'event' },
    { name:'Cafe',                        nasf:1500, on:true, cat:'community' },
    { name:'Eng Learn',                   nasf:4500, on:true, cat:'event' },
    { name:'Loading',                     nasf:2000, on:true, cat:'support' },
    { name:'Bldg Support (Storage, IT, Ops)', nasf:2000, on:true, cat:'support' },
  ],
  upperCommunity: [
    { name:'Living Room / Lounge', nasf:600, on:true },
    { name:'Meeting Rooms (2\u20133)', nasf:2000, on:true },
    { name:'Tea Station / Kitchenette + Seating', nasf:500, on:true },
    { name:'Whiteboard Nooks / Phone Rooms', nasf:500, on:true },
  ],

  // Tab 7 - Scenarios
  scenarios: [],
  activeScenario: -1,

  // Tab 8 - Energy
  energyEUI: {
    wetbio:90, wetchem:110, dryelec:60, comp:40, optics:290, optnano:350,
    core:300, community:40, support:40, event:50, penthouse:50, basement:50,
    custom_1775851246404:90
  },

  // Large Lab constituent mix (maps to real typologies for EUI & cost)
  largeMix: { wetbio: 0.50, wetchem: 0.50 },

  // Basement research allocation (legacy — replaced by basementAllocation map below)
  // Kept on the state object so JSON imports from older versions don't break.
  basementResearchPct: 0.0,

  // Basement Lab Allocation (per-PI-typology) — number of PIs of each type
  // whose LAB + LAB SUPPORT is physically located in the basement. Their
  // desks, faculty office, and flex office always remain on upper research
  // floors regardless of where their lab sits.
  // Keys are S.types[i].id values.
  basementAllocation: {
    wetbio: 3, wetchem: 3, dryelec: 0, comp: 0,
    optics: 2, optnano: 2, custom_1775851246404: 0
  },

  // Tab 9 - Cost (Vermeulens Q4 2025 base rates, Evanston IL, CMAR)
  deptGrossPct: 0.85, // Departmental Gross as % of GSF (remainder is MEP/infrastructure)
  cost: {
    // Core & Shell ($/SF against TOTAL GSF — structure, enclosure, base MEP)
    coreShellRate: 872,
    // Site & Demo ($/SF against total GSF)
    siteRate: 90,

    // Program fitout rates by PI typology ($/SF against type GFA)
    // Includes: interiors + fit/equip + mechanical + electrical + general requirements
    typeRates: {
      wetbio: 646, wetchem: 830, dryelec: 538, comp: 538,
      optics: 559, optnano: 593, custom_1775851246404: 516
    },

    // Core facility rates by name ($/SF against item GFA)
    coreRates: {
      'Advanced Imaging / Characterization': 517,
      'Shared Instrumentation / Fabrication': 1680,
      'Flex Lab': 646,
      'Battery / Energy Testing': 520,
      'Robotics / Flight Test': 538,
      'Structural / Materials Testing': 538,
      'Simulation / Visualization': 538,
      'Anechoic / Environmental Chamber': 559,
    },

    // Non-research program rates ($/SF against area GFA)
    communityRate: 425,
    eventRate: 425,
    supportRate: 342,

    // Escalation (compound annual from base to midpoint of construction)
    escalationRate: 0.04,   // ~4% annual (Vermeulens: 8.07% over 2 years)
    escalationYear: 2027,   // midpoint year
    escalationQuarter: 4,   // Q4
    baseYear: 2025,         // cost basis year
    baseQuarter: 4,         // Q4

    // Tariff premium (applied after escalation)
    tariffPct: 0.02,

    // Soft cost multiplier (design, contingency, etc.)
    softMultiplier: 1.45,
  },

  // Tab 10 - Neighborhood (workshop exercise)
  labBudget: 10000,
  labModule: [
    { label:'Wet Bio PI', groupSize:10, labSF:150, deskSF:50, qty:2 },
    { label:'Computational PI', groupSize:6, labSF:0, deskSF:85, qty:1 },
  ],
};

// Init default PI distribution
function initDefaultMix() {
  S.types[0].pis = 6;
  S.types[1].pis = 6;
  S.types[2].pis = 6;
  S.types[3].pis = 6;
  S.types[4].pis = 2;
  S.types[5].pis = 2;
  S.types[6].pis = 2;
}
initDefaultMix();

// ============================================================
// DERIVED CALCULATIONS (Open Lab + Lab Support + Write-Up Desk + Offices)
// ============================================================
function calcGroupNASF(t) {
  return Math.round(t.fteCount * (t.openLabPerFTE + t.labSupportPerFTE + t.deskPerFTE) + t.facultyOffice + t.flexOffice);
}
function calcGroupOpenLab(t)    { return t.fteCount * t.openLabPerFTE; }
function calcGroupLabSupport(t) { return t.fteCount * t.labSupportPerFTE; }
function calcGroupDesk(t)       { return t.fteCount * t.deskPerFTE; }

// Merge large lab NASF into constituent typologies for display
function mergeLargeLabBreakdown(typeBreakdown) {
  var largeLab = null;
  var merged = {};
  typeBreakdown.forEach(function(t) {
    if (t.id === 'custom_1775851246404') { largeLab = t; return; }
    merged[t.id] = { id:t.id, label:t.label, color:t.color, pis:t.pis,
      groupNASF:t.groupNASF, totalNASF:t.totalNASF, largePIs:0 };
  });
  if (largeLab && largeLab.pis > 0) {
    Object.keys(S.largeMix).forEach(function(k) {
      var share = S.largeMix[k];
      if (share <= 0) return;
      var addNASF = Math.round(largeLab.totalNASF * share);
      if (merged[k]) {
        merged[k].totalNASF += addNASF;
        merged[k].largePIs += largeLab.pis;
      } else {
        var src = S.types.find(function(x){return x.id===k});
        merged[k] = { id:k, label:src?src.label:k, color:src?src.color:'#999', pis:0,
          groupNASF:0, totalNASF:addNASF, largePIs:largeLab.pis };
      }
    });
  }
  return Object.keys(merged).map(function(k){ return merged[k]; }).filter(function(t){ return t.pis > 0 || t.totalNASF > 0; });
}

function C() {
  var totalGSF = S.basementGSF + (S.aboveGradeFloors * S.aboveGradeGSF) + S.penthouseGSF;
  var researchFloors = S.aboveGradeFloors - 1;
  var researchFloorNASF = Math.round(S.aboveGradeGSF * S.aboveGradeEff);
  var gfNASF = Math.round(S.aboveGradeGSF * S.groundFloorEff);
  var basementNASF = Math.round(S.basementGSF * S.basementEff);
  var totalNASF = basementNASF + gfNASF + (researchFloors * researchFloorNASF);
  var overallEff = totalGSF > 0 ? totalNASF / totalGSF : 0;
  var communityNASF = Math.round(totalGSF * S.communityPct);

  // PI lab NASF (Open Lab + Lab Support + Desk + Offices)
  var piNASF = 0, totalPIs = 0, totalFTEs = 0;
  var bldgOpenLab = 0, bldgLabSupport = 0, bldgDesk = 0, bldgOffice = 0;
  var typeBreakdown = S.types.map(function(t) {
    var groupNASF = calcGroupNASF(t);
    var total = groupNASF * t.pis;
    piNASF += total;
    totalPIs += t.pis;
    totalFTEs += t.pis * (1 + t.fteCount);
    var gOL = calcGroupOpenLab(t);
    var gLS = calcGroupLabSupport(t);
    var gDK = calcGroupDesk(t);
    var gOff = t.facultyOffice + t.flexOffice;
    bldgOpenLab += gOL * t.pis;
    bldgLabSupport += gLS * t.pis;
    bldgDesk += gDK * t.pis;
    bldgOffice += gOff * t.pis;
    return { id:t.id, label:t.label, color:t.color, pis:t.pis,
             fteCount:t.fteCount, openLabPerFTE:t.openLabPerFTE, labSupportPerFTE:t.labSupportPerFTE, deskPerFTE:t.deskPerFTE,
             facultyOffice:t.facultyOffice, flexOffice:t.flexOffice,
             groupOpenLab:gOL, groupLabSupport:gLS, groupDesk:gDK, groupOffice:gOff,
             groupNASF:groupNASF, totalNASF:total };
  });

  var coreNASF = 0;
  S.coreItems.forEach(function(c) { if (c.on) coreNASF += c.nasf; });
  var coreTarget = Math.round(piNASF * S.corePct);
  var researchNASF = piNASF + coreNASF;

  var gfUsed = 0;
  S.gfProgram.forEach(function(g) { if (g.on) gfUsed += g.nasf; });
  var eventNASF = S.gfProgram.filter(function(g){return g.on && g.cat==='event'}).reduce(function(s,g){return s+g.nasf},0);
  var gfCommunity = S.gfProgram.filter(function(g){return g.on && g.cat==='community'}).reduce(function(s,g){return s+g.nasf},0);
  var gfSupport = S.gfProgram.filter(function(g){return g.on && g.cat==='support'}).reduce(function(s,g){return s+g.nasf},0);

  // Upper floor community: itemized per-floor, then multiplied by research floors
  var upperCommunityPerFloor = 0;
  S.upperCommunity.forEach(function(u) { if (u.on) upperCommunityPerFloor += u.nasf; });
  var upperCommunityTotal = upperCommunityPerFloor * researchFloors;
  var communityNASFActual = gfCommunity + upperCommunityTotal;
  var totalDemand = researchNASF + communityNASFActual + eventNASF + gfSupport;
  var surplus = totalNASF - totalDemand;

  // Energy model — kBTU by space type, % of GSF allocation, total kBTU
  var eui = S.energyEUI;
  var energyBreakdown = [];
  var totalKBTU = 0;

  // Each PI typology: its NASF as % of totalGSF → kBTU
  // Large labs use weighted EUI from constituent types
  typeBreakdown.forEach(function(t) {
    var pctGSF = totalGSF > 0 ? t.totalNASF / totalGSF : 0;
    var gsf = pctGSF * totalGSF;
    var effectiveEUI;
    if (t.id === 'custom_1775851246404') {
      effectiveEUI = 0;
      Object.keys(S.largeMix).forEach(function(k) { effectiveEUI += S.largeMix[k] * (eui[k] || 0); });
    } else {
      effectiveEUI = eui[t.id] || 0;
    }
    var kbtu = gsf * effectiveEUI;
    totalKBTU += kbtu;
    energyBreakdown.push({ id:t.id, label:t.label, color:t.color, nasf:t.totalNASF, euiVal:effectiveEUI, kbtu:kbtu, pctGSF:pctGSF });
  });

  // Core
  var coreKBTU = coreNASF * (eui.core || 0);
  totalKBTU += coreKBTU;
  energyBreakdown.push({ id:'core', label:'Core Facilities', color:'var(--clrCore)', nasf:coreNASF, euiVal:eui.core||0, kbtu:coreKBTU, pctGSF: totalGSF>0 ? coreNASF/totalGSF : 0 });

  // Community
  var commKBTU = communityNASFActual * (eui.community || 0);
  totalKBTU += commKBTU;
  energyBreakdown.push({ id:'community', label:'Community', color:'var(--clrCommunity)', nasf:communityNASFActual, euiVal:eui.community||0, kbtu:commKBTU, pctGSF: totalGSF>0 ? communityNASFActual/totalGSF : 0 });

  // Event
  var eventKBTU = eventNASF * (eui.event || 0);
  totalKBTU += eventKBTU;
  energyBreakdown.push({ id:'event', label:'Event', color:'var(--clrEvent)', nasf:eventNASF, euiVal:eui.event||0, kbtu:eventKBTU, pctGSF: totalGSF>0 ? eventNASF/totalGSF : 0 });

  // Support
  var supportKBTU = gfSupport * (eui.support || 0);
  totalKBTU += supportKBTU;
  energyBreakdown.push({ id:'support', label:'Support', color:'var(--clrSupport)', nasf:gfSupport, euiVal:eui.support||0, kbtu:supportKBTU, pctGSF: totalGSF>0 ? gfSupport/totalGSF : 0 });

  // Penthouse
  var penthouseKBTU = S.penthouseGSF * (eui.penthouse || 0);
  totalKBTU += penthouseKBTU;
  energyBreakdown.push({ id:'penthouse', label:'Penthouse / Mechanical', color:'#AAA', nasf:S.penthouseGSF, euiVal:eui.penthouse||0, kbtu:penthouseKBTU, pctGSF: totalGSF>0 ? S.penthouseGSF/totalGSF : 0 });

  // Basement
  var basementKBTU = basementNASF * (eui.basement || 0);
  totalKBTU += basementKBTU;
  energyBreakdown.push({ id:'basement', label:'Basement', color:'#C2C3C8', nasf:basementNASF, euiVal:eui.basement||0, kbtu:basementKBTU, pctGSF: totalGSF>0 ? basementNASF/totalGSF : 0 });

  var buildingEUI = totalGSF > 0 ? totalKBTU / totalGSF : 0;

  // ──────────────────────────────────────────────────────────
  // Basement Lab Allocation (per-typology PI placement)
  // ──────────────────────────────────────────────────────────
  // For each typology, basementPIs of its PIs have their lab + lab support
  // physically in the basement. Their desks + offices stay on upper floors.
  var basementLabNASF = 0;
  var upperLabNASF = 0;
  var allOfficeDeskNASF = 0;   // every PI's desks + offices (always upper)
  var basementByType = [];     // for UI/breakdown

  S.types.forEach(function(t) {
    var maxBsmt = t.pis;
    var bp = (S.basementAllocation && S.basementAllocation[t.id] !== undefined)
             ? S.basementAllocation[t.id] : 0;
    bp = Math.max(0, Math.min(maxBsmt, parseInt(bp) || 0));
    // If typology has no lab portion (computational), force basement allocation to 0
    var labPerPI = t.fteCount * (t.openLabPerFTE + t.labSupportPerFTE);
    if (labPerPI <= 0) bp = 0;

    var officeDeskPerPI = t.fteCount * t.deskPerFTE + t.facultyOffice + t.flexOffice;
    basementLabNASF += bp * labPerPI;
    upperLabNASF    += (t.pis - bp) * labPerPI;
    allOfficeDeskNASF += t.pis * officeDeskPerPI;

    basementByType.push({
      id:t.id, label:t.label, color:t.color, totalPIs:t.pis,
      basementPIs:bp, labPerPI:labPerPI, basementLabNASF: bp * labPerPI,
      hasLab: labPerPI > 0,
    });
  });

  // Basement capacity check: lab allocation + cores all need to fit
  // (cores are assumed basement-located via existing coreFloorSplit default {basement:1, ground:0, research:0})
  var basementCoreNASF = Math.round(coreNASF * (S.coreFloorSplit ? S.coreFloorSplit.basement : 1));
  var basementUsed = basementLabNASF + basementCoreNASF;
  var basementCapacity = basementNASF;  // alias for clarity
  var basementSurplus = basementCapacity - basementUsed;

  // Upper-floor (research floors) demand check
  // Upper floors hold: all PIs' offices+desks, upper-located PIs' labs, and
  // upper-floor community (per research floor × N floors).
  var upperFloorDemand = upperLabNASF + allOfficeDeskNASF + upperCommunityTotal;
  var upperFloorCapacity = researchFloors * researchFloorNASF;
  var upperFloorSurplus = upperFloorCapacity - upperFloorDemand;

  // Legacy field — kept for backward compat with anything that still reads it.
  // Now reflects the actual lab allocation in basement (not the old % slider).
  var basementResearchNASF = basementLabNASF;

  return {
    totalGSF:totalGSF, totalNASF:totalNASF, overallEff:overallEff,
    researchFloors:researchFloors, researchFloorNASF:researchFloorNASF,
    gfNASF:gfNASF, basementNASF:basementNASF, basementResearchNASF:basementResearchNASF,
    basementLabNASF:basementLabNASF, basementCoreNASF:basementCoreNASF,
    basementUsed:basementUsed, basementCapacity:basementCapacity, basementSurplus:basementSurplus,
    basementByType:basementByType,
    upperLabNASF:upperLabNASF, allOfficeDeskNASF:allOfficeDeskNASF,
    upperFloorDemand:upperFloorDemand, upperFloorCapacity:upperFloorCapacity,
    upperFloorSurplus:upperFloorSurplus,
    communityNASF:communityNASF, communityNASFActual:communityNASFActual,
    eventNASF:eventNASF, piNASF:piNASF, totalPIs:totalPIs, totalFTEs:totalFTEs,
    typeBreakdown:typeBreakdown, coreNASF:coreNASF, coreTarget:coreTarget,
    researchNASF:researchNASF, gfUsed:gfUsed, gfCommunity:gfCommunity,
    gfSupport:gfSupport, upperCommunityTotal:upperCommunityTotal,
    upperCommunityPerFloor:upperCommunityPerFloor, totalDemand:totalDemand, surplus:surplus,
    bldgOpenLab:bldgOpenLab, bldgLabSupport:bldgLabSupport, bldgDesk:bldgDesk, bldgOffice:bldgOffice,
    energyBreakdown:energyBreakdown, totalKBTU:totalKBTU, buildingEUI:buildingEUI,
    cost: calcCost(totalGSF, totalNASF, piNASF, coreNASF, communityNASFActual, eventNASF, gfSupport, typeBreakdown, bldgOpenLab, bldgLabSupport, bldgDesk),
  };
}

function calcCost(totalGSF, totalNASF, piNASF, coreNASF, commNASF, eventNASF, supportNASF, typeBreakdown, openLabNASF, labSupportNASF, deskNASF) {
  var cs = S.cost;

  // DGSF model: Departmental Gross = GSF × deptGrossPct, MEP/Shell = remainder
  var dgsf = Math.round(totalGSF * S.deptGrossPct);
  var mepGSF = totalGSF - dgsf;
  // NASF-to-DGSF inflation factor (NASF → GFA for each program type)
  var dgsfFactor = totalNASF > 0 ? dgsf / totalNASF : 1;

  // ── CORE & SHELL (applied to total GSF) ──
  var totalCoreShell = Math.round(totalGSF * cs.coreShellRate);

  // ── SITE & DEMO (applied to total GSF) ──
  var totalSite = Math.round(totalGSF * cs.siteRate);

  // ── PROGRAM FITOUT by PI typology (Vermeulens per-type rates × type GFA) ──
  var progLines = [];
  var officeNASF = 0;
  typeBreakdown.forEach(function(t) {
    if (t.pis <= 0) return;
    var typeGFA = Math.round(t.totalNASF * dgsfFactor);
    var rate = cs.typeRates[t.id] || 538;
    var typeCost = typeGFA * rate;
    officeNASF += t.groupOffice * t.pis;
    progLines.push({ cat:t.label, nasf:t.totalNASF, dgsf:typeGFA, rate:rate, cost:typeCost, group:'research', color:t.color });
  });

  // ── CORE FACILITIES (individual Vermeulens rates) ──
  S.coreItems.forEach(function(c) {
    if (!c.on) return;
    var cGFA = Math.round(c.nasf * dgsfFactor);
    var rate = cs.coreRates[c.name] || 538;
    var cCost = cGFA * rate;
    progLines.push({ cat:c.name, nasf:c.nasf, dgsf:cGFA, rate:rate, cost:cCost, group:'core' });
  });

  // ── NON-RESEARCH PROGRAM AREAS ──
  var nonRes = [
    { cat:'Community',      nasf:commNASF,     rate:cs.communityRate, group:'other' },
    { cat:'Event',          nasf:eventNASF,     rate:cs.eventRate, group:'other' },
    { cat:'Support',        nasf:supportNASF,   rate:cs.supportRate, group:'other' },
  ];
  nonRes.forEach(function(p) {
    p.dgsf = Math.round(p.nasf * dgsfFactor);
    p.cost = p.dgsf * p.rate;
    progLines.push(p);
  });

  var totalFitout = 0;
  progLines.forEach(function(p) { totalFitout += p.cost; });

  // ── BASE CONSTRUCTION (Q4 2025) ──
  var constructionCost = totalCoreShell + totalFitout + totalSite;

  // ── ESCALATION ──
  var baseQ = cs.baseQuarter || 4;
  var yearsToMid = (cs.escalationYear - cs.baseYear) + (cs.escalationQuarter - baseQ) / 4;
  var escalationFactor = Math.pow(1 + cs.escalationRate, yearsToMid);
  var escalatedConstruction = Math.round(constructionCost * escalationFactor);

  // ── TARIFF PREMIUM ──
  var tariffCost = Math.round(escalatedConstruction * cs.tariffPct);
  var postTariff = escalatedConstruction + tariffCost;

  // ── PROJECT COST (soft costs) ──
  var projectCost = Math.round(postTariff * cs.softMultiplier);

  return {
    dgsf:dgsf, mepGSF:mepGSF, dgsfFactor:dgsfFactor,
    totalCoreShell:totalCoreShell, totalSite:totalSite,
    totalShell:totalCoreShell, // backward compat alias
    progLines:progLines, totalFitout:totalFitout,
    openLabNASF:openLabNASF, labSupportNASF:labSupportNASF, deskNASF:deskNASF, officeNASF:officeNASF,
    constructionCost:constructionCost,
    escalationFactor:escalationFactor, yearsToMid:yearsToMid,
    escalatedConstruction:escalatedConstruction,
    tariffCost:tariffCost, tariffPct:cs.tariffPct, postTariff:postTariff,
    softMultiplier:cs.softMultiplier, projectCost:projectCost,
    totalGSF: totalGSF,
    costPerGSF: totalGSF > 0 ? projectCost / totalGSF : 0,
    constructionPerGSF: totalGSF > 0 ? postTariff / totalGSF : 0,
  };
}

function F(n) { return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ','); }
function P(n) { return Math.round(n * 100) + '%'; }

var TABS = ['Project Size','PI Typologies','Building Mix','Basement','Community','Floor Stacking','Scenarios','Energy','Cost','Neighborhood','Visualizations'];
var activeTab = 0;

function renderTabs() {
  var h = '';
  TABS.forEach(function(t, i) {
    h += '<button class="tab' + (i===activeTab?' on':'') + '" onclick="switchTab('+i+')">' + (i+1) + '. ' + t + '</button>';
  });
  document.getElementById('tabBar').innerHTML = h;
}

function switchTab(i) { activeTab = i; render(); }

// ============================================================
// METRICS STRIP
// ============================================================
function renderMetrics(d) {
  var items = [
    { v:F(d.totalGSF), l:'Total GSF' },
    { v:F(d.totalNASF), l:'Total NASF' },
    { v:P(d.overallEff), l:'Efficiency' },
    { v:d.totalPIs, l:'Total PIs' },
    { v:F(d.piNASF), l:'Research NASF' },
    { v:F(d.coreNASF), l:'Core NASF' },
    { v:F(d.communityNASFActual), l:'Community NASF' },
    { v:(d.surplus>=0?'+':'')+F(d.surplus), l:'Surplus / Deficit' },
    { v:F(Math.round(d.buildingEUI)), l:'kBTU/SF (EUI)' },
    { v:FMM(d.cost.projectCost), l:'Project Cost' },
  ];
  var h = '';
  items.forEach(function(m) {
    h += '<div class="m"><div class="mv">'+m.v+'</div><div class="ml">'+m.l+'</div></div>';
  });
  document.getElementById('metrics').innerHTML = h;
}

// ============================================================
// RENDER
// ============================================================
function render() {
  var d = C();
  renderTabs();
  renderMetrics(d);
  var el = document.getElementById('content');
  if (activeTab === 0) el.innerHTML = renderProjectSize(d);
  else if (activeTab === 1) el.innerHTML = renderTypologies(d);
  else if (activeTab === 2) el.innerHTML = renderMix(d);
  else if (activeTab === 3) el.innerHTML = renderBasement(d);
  else if (activeTab === 4) el.innerHTML = renderCommunity(d);
  else if (activeTab === 5) el.innerHTML = renderStacking(d);
  else if (activeTab === 6) el.innerHTML = renderScenarios(d);
  else if (activeTab === 7) el.innerHTML = renderEnergy(d);
  else if (activeTab === 8) el.innerHTML = renderCost(d);
  else if (activeTab === 9) el.innerHTML = renderLabModule();
  else if (activeTab === 10) { el.innerHTML = renderVisualizations(d); mountD3Visuals(d); }
  document.getElementById('ts').textContent = new Date().toLocaleString();
}

  h += '</div>';

  h += sl('Penthouse Floor Plate', 'penthouseGSF', S.penthouseGSF, 5000, 30000, 1000, ' GSF');
  h += sl('Above-Grade Floor Plate', 'aboveGradeGSF', S.aboveGradeGSF, 15000, 45000, 1000, ' GSF');
  h += sl('Basement Floor Plate', 'basementGSF', S.basementGSF, 10000, 45000, 1000, ' GSF');

function sl(label, key, val, min, max, step, suffix, isPct) {
  var display = isPct ? val + suffix : F(val) + suffix;
  return '<label class="sl">'+label+'</label>' +
    '<div class="sl-row"><input type="range" min="'+min+'" max="'+max+'" step="'+step+'" value="'+val+'" oninput="setSl(\''+key+'\',this.value,'+!!isPct+')"><div class="sl-val">'+display+'</div></div>';
}

function setSl(key, val, isPct) {
  val = parseFloat(val);
  if (isPct) S[key] = val / 100;
  else S[key] = val;
  render();
}

function renderMiniSection(d) {
  var floors = [];
  floors.push({ label:'Penthouse', nasf:S.penthouseGSF, type:'support', displayNASF:false });
  var topFloor = S.aboveGradeFloors;
  for (var i = topFloor; i >= 2; i--) {
    floors.push({ label:'Floor ' + i, nasf:d.researchFloorNASF, type:'research', displayNASF:true });
  }
  floors.push({ label:'Floor 1 (Ground)', nasf:d.gfNASF, type:'ground', displayNASF:true });
  floors.push({ label:'__GRADE_LINE__' });
  floors.push({ label:'Basement', nasf:d.basementNASF, type:'basement', displayNASF:true });

  var h = '<div style="max-width:700px;margin:0 auto">';
  floors.forEach(function(f) {
    if (f.label === '__GRADE_LINE__') { h += '<div style="border-top:3px solid #000;margin:4px 0"></div>'; return; }
    var color, ht;
    if (f.type==='support') { color='var(--clrSupport)'; ht='30px'; }
    else if (f.type==='research') { color='var(--clrResearch)'; ht='48px'; }
    else if (f.type==='ground') { color='var(--clrCommunity)'; ht='48px'; }
    else { color='var(--mut)'; ht='36px'; }
    var lbl = f.displayNASF ? f.label + ' \u2014 ' + F(f.nasf) + ' NASF' : f.label + ' (Building Support)';
    h += '<div class="floor-row"><div class="floor-label">'+f.label+'</div>';
    h += '<div style="flex:1;height:'+ht+';border-radius:8px;background:'+color+';display:flex;align-items:center;padding:0 14px">';
    h += '<span style="font-size:.9rem;font-weight:700;color:#fff">'+lbl+'</span>';
    h += '</div></div>';
  });
  h += '</div>';
  return h;
}

// ============================================================
// TAB 2: PI TYPOLOGIES
// ============================================================
function renderTypologies(d) {
  var h = '<div class="note-bl">Define what a \u201Ctypical PI group\u201D looks like for each lab type. Group NASF = FTE \u00d7 (Open Lab + Lab Support + Write-Up Desk) + Faculty Office + Flex Office.</div>';

  // Add typology button
  h += '<div style="margin-bottom:12px"><button class="btn btn-navy" onclick="addType()">+ Add Typology</button></div>';

  h += '<div class="g3" style="grid-template-columns:repeat(auto-fill,minmax(340px,1fr))">';
  S.types.forEach(function(t, i) {
    var groupNASF = calcGroupNASF(t);
    var gOL = calcGroupOpenLab(t);
    var gLS = calcGroupLabSupport(t);
    var gDK = calcGroupDesk(t);
    var nasfPerFTE = t.fteCount > 0 ? Math.round(groupNASF / t.fteCount) : 0;

    h += '<div class="typ-card" style="border-color:'+t.color+'40">';

    // Header row with editable name and delete button
    h += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">';
    h += '<h4 style="background:'+t.color+';flex:1;margin:0"><input type="text" value="'+t.label.replace(/"/g,'&quot;')+'" style="background:transparent;border:none;color:#fff;font-size:1.05rem;font-weight:900;font-family:inherit;width:100%;outline:none" onchange="renameType('+i+',this.value)"></h4>';
    if (S.types.length > 1) h += '<button class="btn btn-out btn-sm" style="color:var(--coral);border-color:var(--coral);white-space:nowrap" onclick="deleteType('+i+')">Delete</button>';
    h += '</div>';

    // Group Size
    h += '<div class="typ-row"><span class="tk">FTE per Group</span><span class="tv"><input type="number" value="'+t.fteCount+'" min="0" max="100" style="width:65px" onchange="setType('+i+',\'fteCount\',this.value)"></span></div>';

    // Three space sub-category sliders
    h += '<div style="margin:8px 0 4px;font-weight:700;font-size:.78rem;text-transform:uppercase;letter-spacing:.5px;color:var(--navy)">SF per FTE breakdown</div>';
    h += '<div class="typ-row"><span class="tk" style="color:'+FICM.resA+'">Open Lab</span><span class="tv"><input type="number" value="'+t.openLabPerFTE+'" min="0" max="500" step="5" style="width:65px" onchange="setType('+i+',\'openLabPerFTE\',this.value)"></span></div>';
    h += '<div class="typ-row"><span class="tk" style="color:'+FICM.resB+'">Lab Support</span><span class="tv"><input type="number" value="'+t.labSupportPerFTE+'" min="0" max="300" step="5" style="width:65px" onchange="setType('+i+',\'labSupportPerFTE\',this.value)"></span></div>';
    h += '<div class="typ-row"><span class="tk" style="color:'+FICM.officeA+'">Write-Up Desk</span><span class="tv"><input type="number" value="'+t.deskPerFTE+'" min="0" max="300" step="5" style="width:65px" onchange="setType('+i+',\'deskPerFTE\',this.value)"></span></div>';

    // Faculty / Flex office
    h += '<div style="margin-top:6px"></div>';
    h += '<div class="typ-row"><span class="tk">Faculty Office SF</span><span class="tv"><input type="number" value="'+t.facultyOffice+'" min="0" max="400" step="10" style="width:65px" onchange="setType('+i+',\'facultyOffice\',this.value)"></span></div>';
    h += '<div class="typ-row"><span class="tk">Flex / Open Office SF</span><span class="tv"><input type="number" value="'+t.flexOffice+'" min="0" max="200" step="10" style="width:65px" onchange="setType('+i+',\'flexOffice\',this.value)"></span></div>';

    // Group NASF result with color-coded bar
    h += '<div style="margin-top:10px;padding-top:8px;border-top:2px solid '+t.color+'30">';

    // Mini stacked bar
    var barTotal = gOL + gLS + gDK + t.facultyOffice + t.flexOffice;
    if (barTotal > 0) {
      h += '<div style="display:flex;gap:2px;margin-bottom:6px;height:12px;border-radius:4px;overflow:hidden">';
      if (gOL > 0) h += '<div style="flex:'+gOL+';background:'+FICM.resA+'" title="Open Lab: '+F(gOL)+' SF"></div>';
      if (gLS > 0) h += '<div style="flex:'+gLS+';background:'+FICM.resB+'" title="Lab Support: '+F(gLS)+' SF"></div>';
      if (gDK > 0) h += '<div style="flex:'+gDK+';background:'+FICM.officeA+'" title="Write-Up Desk: '+F(gDK)+' SF"></div>';
      if (t.facultyOffice + t.flexOffice > 0) h += '<div style="flex:'+(t.facultyOffice+t.flexOffice)+';background:'+FICM.office+'" title="Office: '+F(t.facultyOffice+t.flexOffice)+' SF"></div>';
      h += '</div>';
    }

    h += '<div class="typ-row"><span class="tk" style="font-weight:700;color:var(--navy)">Group NASF</span><span class="tv" style="font-size:1.7rem;color:'+t.color+'">'+F(groupNASF)+'</span></div>';
    h += '<div style="font-size:.78rem;color:var(--mut);margin-top:2px;line-height:1.4">';
    h += t.fteCount + ' FTE \u00d7 (';
    var parts = [];
    if (t.openLabPerFTE > 0) parts.push('<span style="color:'+FICM.resA+'">'+t.openLabPerFTE+' lab</span>');
    if (t.labSupportPerFTE > 0) parts.push('<span style="color:'+FICM.resB+'">'+t.labSupportPerFTE+' support</span>');
    if (t.deskPerFTE > 0) parts.push('<span style="color:'+FICM.officeA+'">'+t.deskPerFTE+' desk</span>');
    h += parts.join(' + ') || '0';
    h += ') + office ' + t.facultyOffice + '+' + t.flexOffice;
    if (t.fteCount > 0) h += ' &mdash; '+F(nasfPerFTE)+' NASF/FTE';
    h += '</div>';
    h += '</div></div>';
  });
  h += '</div>';

  // Building-wide sub-category summary
  h += '<div class="card" style="margin-top:12px"><div class="card-title">Space Category Totals (All PIs)</div>';
  h += '<div class="bar-budget" style="height:110px;font-family:\'IBM Plex Mono\',monospace;margin-bottom:8px">';
  var allLab = d.bldgOpenLab + d.bldgLabSupport + d.bldgDesk + d.bldgOffice;
  if (allLab > 0) {
    var segs = [
      { val:d.bldgOpenLab, c:FICM.resA, lbl:'Open Lab' },
      { val:d.bldgLabSupport, c:FICM.resB, lbl:'Lab Support' },
      { val:d.bldgDesk, c:FICM.officeA, lbl:'Desk' },
      { val:d.bldgOffice, c:FICM.office, lbl:'Office' }
    ];
    segs.forEach(function(seg) {
      if (seg.val > 0) {
        var p = (seg.val/allLab*100);
        h += '<div style="width:'+p.toFixed(1)+'%;background:'+seg.c+';display:flex;align-items:center;justify-content:center;overflow:hidden;flex-direction:column;gap:1px;padding:2px 0">';
        h += '<span style="font-size:.7rem;font-weight:700;color:#fff;white-space:nowrap">'+seg.lbl+'</span>';
        h += '<span style="font-size:.75rem;font-weight:800;color:#fff;white-space:nowrap">'+F(seg.val)+' SF</span>';
        h += '<span style="font-size:.65rem;font-weight:600;color:rgba(255,255,255,0.8);white-space:nowrap">'+Math.round(p)+'%</span>';
        h += '</div>';
      }
    });
  }
  h += '</div></div>';

  // Summary table with editable infra
  h += '<div class="card" style="margin-top:12px"><div class="card-title">Typology Summary</div>';
  h += '<table class="comp"><tr><th>Lab Type</th><th>FTE</th><th style="color:'+FICM.resA+'">Open Lab</th><th style="color:'+FICM.resB+'">Lab Support</th><th style="color:'+FICM.officeA+'">Desk</th><th>Group NASF</th><th>Typical Infrastructure</th></tr>';
  S.types.forEach(function(t, i) {
    var gn = calcGroupNASF(t);
    var totalPerFTE = t.openLabPerFTE + t.labSupportPerFTE + t.deskPerFTE;
    var olPct = totalPerFTE > 0 ? Math.round(t.openLabPerFTE / totalPerFTE * 100) : 0;
    var lsPct = totalPerFTE > 0 ? Math.round(t.labSupportPerFTE / totalPerFTE * 100) : 0;
    var dkPct = totalPerFTE > 0 ? (100 - olPct - lsPct) : 0;
    var pctStyle = 'display:block;font-size:.65rem;font-weight:400;color:var(--mut);line-height:1.1';
    h += '<tr><td style="font-weight:700;color:'+t.color+'">'+t.label+'</td>';
    h += '<td>'+t.fteCount+'</td>';
    h += '<td>'+t.openLabPerFTE+'<span style="'+pctStyle+'">'+olPct+'%</span></td>';
    h += '<td>'+t.labSupportPerFTE+'<span style="'+pctStyle+'">'+lsPct+'%</span></td>';
    h += '<td>'+t.deskPerFTE+'<span style="'+pctStyle+'">'+dkPct+'%</span></td>';
    h += '<td style="font-weight:700">'+F(gn)+'</td>';
    h += '<td><textarea rows="1" style="width:100%;min-width:180px;border:1px solid var(--bdr);border-radius:4px;padding:4px 6px;font-family:Sora,sans-serif;font-weight:300;font-size:.82rem;color:var(--dk);resize:vertical" onchange="setTypeInfra('+i+',this.value)">'+t.infra+'</textarea></td>';
    h += '</tr>';
  });
  h += '</table></div>';
  return h;
}

function setType(i, key, val) { S.types[i][key] = parseFloat(val); render(); }
function setTypeInfra(i, val) { S.types[i].infra = val; }
function renameType(i, val) { S.types[i].label = val.trim() || S.types[i].label; render(); }

function addType() {
  var ci = S.types.length % TYPE_COLORS.length;
  S.types.push({
    id: 'custom_' + Date.now(),
    label: 'New Lab Type',
    color: TYPE_COLORS[ci],
    fteCount: 6, openLabPerFTE: 120, labSupportPerFTE: 80, deskPerFTE: 85,
    facultyOffice: 120, flexOffice: 30,
    infra: 'Define infrastructure requirements',
    pis: 0
  });
  render();
}

function deleteType(i) {
  if (S.types.length <= 1) return;
  S.types.splice(i, 1);
  render();
}

// ============================================================
// TAB 3: BUILDING MIX
// ============================================================
function renderMix(d) {
  var h = '<div class="note">Distribute PIs across lab types. NASF demand updates live against your budget of '+F(d.totalNASF)+' NASF.</div>';

  h += '<div class="card"><div class="card-title">NASF Budget Check</div>';
  var cap = d.totalNASF;
  var used = d.totalDemand;
  var cls = d.surplus >= 0 ? 'var(--green)' : 'var(--coral)';
  h += '<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:1.1rem;font-weight:700">Total Demand: '+F(used)+' NASF</span><span style="font-size:1.1rem;font-weight:700;color:'+cls+'">'+(d.surplus>=0?'+':'')+F(d.surplus)+' NASF '+(d.surplus>=0?'remaining':'over')+'</span></div>';
  h += '<div class="bar-budget" style="height:36px">';
  d.typeBreakdown.forEach(function(t){
    var tw = cap>0 ? (t.totalNASF/cap*100) : 0;
    if (tw > 0) h += '<div style="width:'+tw.toFixed(1)+'%;background:'+t.color+'" title="'+t.label+': '+F(t.totalNASF)+'"></div>';
  });
  var corePctW = cap>0?(d.coreNASF/cap*100):0;
  h += '<div style="width:'+corePctW.toFixed(1)+'%;background:var(--clrCore)" title="Core: '+F(d.coreNASF)+'"></div>';
  var commPctW = cap>0?(d.communityNASF/cap*100):0;
  h += '<div style="width:'+commPctW.toFixed(1)+'%;background:var(--clrCommunity)" title="Community: '+F(d.communityNASF)+'"></div>';
  h += '</div>';
  h += '<div class="legend" style="margin-top:6px">';
  d.typeBreakdown.forEach(function(t){ if(t.pis>0) h += '<div class="legend-item"><div class="legend-dot" style="background:'+t.color+'"></div>'+t.label+'</div>'; });
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--clrCore)"></div>Core</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--clrCommunity)"></div>Community</div>';
  h += '</div></div>';

  // PI sliders
  h += '<div class="g2"><div class="card"><div class="card-title">PI Distribution</div>';
  h += '<div style="margin-bottom:10px"><label class="sl">Total PIs</label><div class="sl-row"><input type="range" min="10" max="60" step="1" value="'+S.totalPIs+'" oninput="S.totalPIs=parseInt(this.value);render()"><div class="sl-val">'+S.totalPIs+'</div></div></div>';
  S.types.forEach(function(t,i){
    var gn = d.typeBreakdown[i].groupNASF;
    h += '<div style="margin-bottom:8px"><label class="sl" style="color:'+t.color+'">'+t.label+' <span style="font-weight:400;color:var(--mut)">('+F(gn)+' NASF/group)</span></label>';
    h += '<div class="sl-row"><input type="range" min="0" max="'+Math.max(20,t.pis+5)+'" step="1" value="'+t.pis+'" oninput="setPIs('+i+',this.value)"><div class="sl-val" style="color:'+t.color+'">'+t.pis+'</div></div></div>';
  });
  h += '<div style="padding:10px 0;border-top:2px solid var(--navy);display:flex;justify-content:space-between"><span style="font-size:1.05rem;font-weight:900;color:var(--navy)">Assigned PIs</span><span style="font-family:\'IBM Plex Mono\',monospace;font-size:1.4rem;font-weight:700;color:'+(d.totalPIs===S.totalPIs?'var(--navy)':'var(--coral)')+'">'+d.totalPIs+' / '+S.totalPIs+'</span></div>';
  h += '</div>';

  // Right: breakdown — distribute large lab NASF into constituent typologies
  var mergedBreakdown = mergeLargeLabBreakdown(d.typeBreakdown);
  h += '<div class="card"><div class="card-title">NASF Breakdown by Lab Type</div>';
  h += '<div class="card-sub">Large Lab NASF distributed into constituent types (' + Object.keys(S.largeMix).map(function(k){ var t = S.types.find(function(x){return x.id===k}); return Math.round(S.largeMix[k]*100)+'% '+(t?t.label:k); }).join(', ') + ')</div>';
  h += renderBarChart(mergedBreakdown.filter(function(t){return t.totalNASF>0}), 'totalNASF', 'label', 'color');
  h += '<div style="margin-top:16px">';
  h += '<table class="comp"><tr><th>Lab Type</th><th>PIs</th><th>NASF/Group</th><th>Total NASF</th><th>% of Labs</th></tr>';
  mergedBreakdown.forEach(function(t){
    if (t.totalNASF === 0) return;
    var pct = d.piNASF > 0 ? Math.round(t.totalNASF / d.piNASF * 100) : 0;
    var piLabel = t.largePIs ? t.pis + ' <span style="font-weight:400;color:var(--mut)">(+' + t.largePIs + ' lg)</span>' : ''+t.pis;
    h += '<tr><td style="font-weight:700;color:'+t.color+'">'+t.label+'</td><td>'+piLabel+'</td><td>'+F(t.groupNASF)+'</td><td style="font-weight:700">'+F(t.totalNASF)+'</td><td>'+pct+'%</td></tr>';
  });
  h += '<tr style="background:var(--navy)"><td style="color:#fff;font-weight:700" colspan="3">TOTAL RESEARCH &amp; OFFICE</td><td style="color:#fff;font-weight:700">'+F(d.piNASF)+'</td><td style="color:#fff;font-weight:700">100%</td></tr>';
  h += '</table></div></div></div>';
  return h;
}

function setPIs(i, val) { S.types[i].pis = parseInt(val); render(); }

// ============================================================
// TAB 4: CORE FACILITIES
// ============================================================
function renderBasement(d) {
  var h = '';

  // \u2500\u2500 Top-level metrics \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  var utilPct = d.basementCapacity > 0 ? (d.basementUsed / d.basementCapacity * 100) : 0;
  var basementOver = d.basementSurplus < 0;
  var upperOver = d.upperFloorSurplus < 0;

  h += '<div class="card"><div class="card-title">Basement \u2014 Allocation Overview</div>';
  h += '<div class="card-sub">Place PI typology labs and core facilities into the basement. Desks, faculty offices, and flex offices for all PIs always remain on upper research floors regardless of where their lab sits.</div>';
  h += '<div class="ms" style="margin-top:8px">';
  h += '<div class="m"><div class="mv">'+F(d.basementCapacity)+'</div><div class="ml">Basement NASF Capacity</div></div>';
  h += '<div class="m"><div class="mv">'+F(d.basementUsed)+'</div><div class="ml">Currently Allocated</div></div>';
  h += '<div class="m"><div class="mv" style="color:'+(basementOver?'var(--coral)':'var(--green)')+'">'+(d.basementSurplus>=0?'+':'')+F(d.basementSurplus)+'</div><div class="ml">'+(basementOver?'Over by':'Remaining')+'</div></div>';
  h += '<div class="m"><div class="mv">'+utilPct.toFixed(0)+'%</div><div class="ml">Utilization</div></div>';
  h += '</div>';
  // Stacked bar showing lab + core allocation
  h += '<div class="bar-budget" style="margin-top:14px">';
  if (d.basementCapacity > 0) {
    var labW = Math.min(100, d.basementLabNASF / d.basementCapacity * 100);
    var coreW = Math.min(100 - labW, d.basementCoreNASF / d.basementCapacity * 100);
    if (labW > 0)  h += '<div style="width:'+labW+'%;background:var(--clrResearch)" title="Lab Allocation: '+F(d.basementLabNASF)+'"></div>';
    if (coreW > 0) h += '<div style="width:'+coreW+'%;background:var(--clrCore)" title="Core Facilities: '+F(d.basementCoreNASF)+'"></div>';
  }
  h += '</div>';
  h += '<div class="legend">';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--clrResearch)"></div>Lab Allocation '+F(d.basementLabNASF)+'</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:var(--clrCore)"></div>Core Facilities '+F(d.basementCoreNASF)+'</div>';
  h += '<div class="legend-item"><div class="legend-dot" style="background:#eee"></div>Remaining '+F(Math.max(0, d.basementSurplus))+'</div>';
  h += '</div>';
  if (basementOver) {
    h += '<div class="note" style="margin-top:10px;background:#FCDEDE;border-color:#E5979F;color:#9E2A30">\u26a0 Basement is over capacity by '+F(-d.basementSurplus)+' NASF. Reduce allocations, increase basement GSF (Project Size tab), or raise basement efficiency.</div>';
  }
  if (upperOver) {
    h += '<div class="note" style="margin-top:10px;background:#FCDEDE;border-color:#E5979F;color:#9E2A30">\u26a0 Upper research floors over capacity by '+F(-d.upperFloorSurplus)+' NASF. Place more typologies in basement to relieve, or add an above-grade floor.</div>';
  }
  h += '</div>';

  // \u2500\u2500 Research Lab Allocation \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
  h += '<div class="card"><div class="card-title">Research Lab Allocation \u2014 PIs in Basement</div>';
  h += '<div class="card-sub">For each typology, choose how many PIs have their lab + lab support physically in the basement. Computational typologies have no lab portion to allocate.</div>';
  h += '<table class="comp"><thead><tr>';
  h += '<th>Typology</th><th>Total PIs</th><th>PIs in Basement</th><th>Lab+Support / PI</th><th>Basement Lab NASF</th>';
  h += '</tr></thead><tbody>';
  d.basementByType.forEach(function(bt) {
    h += '<tr>';
    h += '<td style="font-weight:600;color:var(--navy)"><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:'+bt.color+';margin-right:8px;vertical-align:middle"></span>'+bt.label+'</td>';
    h += '<td>'+bt.totalPIs+'</td>';
    if (!bt.hasLab) {
      h += '<td colspan="2" style="color:var(--mut);font-style:italic">no lab portion \u2014 stays on upper floors</td>';
      h += '<td>0</td>';
    } else if (bt.totalPIs <= 0) {
      h += '<td colspan="2" style="color:var(--mut);font-style:italic">0 PIs assigned</td>';
      h += '<td>0</td>';
    } else {
      h += '<td><div style="display:flex;align-items:center;gap:8px"><input type="range" min="0" max="'+bt.totalPIs+'" step="1" value="'+bt.basementPIs+'" oninput="setBasementAlloc(\''+bt.id+'\',this.value)" style="flex:1;accent-color:var(--navy)"><input type="number" min="0" max="'+bt.totalPIs+'" step="1" value="'+bt.basementPIs+'" onchange="setBasementAlloc(\''+bt.id+'\',this.value)" style="width:60px"></div></td>';
      h += '<td>'+F(bt.labPerPI)+' sf</td>';
      h += '<td style="font-weight:700;color:var(--navy)">'+F(bt.basementLabNASF)+'</td>';
    }
    h += '</tr>';
  });
  h += '<tr style="background:var(--bg);font-weight:700;border-top:2px solid var(--navy)">';
  h += '<td colspan="4" style="padding-left:16px">Lab Subtotal in Basement</td>';
  h += '<td style="color:var(--clrResearch);font-size:1.05rem">'+F(d.basementLabNASF)+'</td>';
  h += '</tr></tbody></table>';
  h += '<div style="margin-top:10px;font-size:.82rem;color:var(--mut);font-style:italic">\u24d8 Desks ('+F(d.bldgDesk||0)+' sf), faculty offices, and flex offices for <strong>all</strong> PIs (whether basement- or upper-located) total '+F(d.allOfficeDeskNASF)+' sf and stay on upper research floors.</div>';
  h += '</div>';

  // \u2500\u2500 Core Facilities (existing list, basement-located) \u2500\u2500\u2500\u2500\u2500\u2500\u2500
  h += '<div class="g2">';
  h += '<div class="card"><div class="card-title">Core Facilities \u2014 Checklist</div>';
  h += '<div class="card-sub">Cores are basement-located by default. Toggle on/off, edit names and NASF.</div>';
  S.coreItems.forEach(function(c, i) {
    var bg = c.on ? 'var(--clrCore)' : '#ddd';
    h += '<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--bdr)">';
    h += '<div style="width:18px;height:18px;border-radius:4px;background:'+bg+';cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0" onclick="toggleCore('+i+')">';

  h += '<div class="card"><div class="card-title">Upper Research Floors \u2014 Capacity Check</div>';

  h += '</div>';

  return h;
}

// Set basement PI allocation for a typology
function setBasementAlloc(typeId, val) {
  if (!S.basementAllocation) S.basementAllocation = {};
  var t = S.types.find(function(x){return x.id===typeId;});
  var max = t ? t.pis : 0;
  var v = Math.max(0, Math.min(max, parseInt(val) || 0));
  S.basementAllocation[typeId] = v;
  render();
}

function setCoreSplit(zone, val) {
  var pct = parseInt(val) / 100;
  S.coreFloorSplit[zone] = pct;
  // Clamp so basement + ground never exceeds 100%
  var other = zone === 'basement' ? 'ground' : 'basement';
  if (S.coreFloorSplit.basement + S.coreFloorSplit.ground > 1) {
    S.coreFloorSplit[other] = Math.max(0, 1 - pct);
  }
  S.coreFloorSplit.research = 1 - S.coreFloorSplit.basement - S.coreFloorSplit.ground;
  render();
}
function toggleCore(i) { S.coreItems[i].on = !S.coreItems[i].on; render(); }
function setCoreNASF(i, v) { S.coreItems[i].nasf = parseInt(v) || 0; render(); }
function renameCore(i, v) { S.coreItems[i].name = v.trim() || S.coreItems[i].name; }
function addCore() {
  S.coreItems.push({ name:'New Core Facility', nasf:1000, on:true });
  render();
}
function deleteCore(i) {
  S.coreItems.splice(i, 1);
  render();
}
